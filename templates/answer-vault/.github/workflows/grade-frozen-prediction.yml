name: grade-frozen-prediction
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Immutable runtime RUN_ID
        required: true
        type: string
      answer_object_path:
        description: Repository-relative path under answers/
        required: true
        type: string
permissions:
  contents: read
jobs:
  grade:
    runs-on: ubuntu-latest
    env:
      RUN_ID: ${{ inputs.run_id }}
      ANSWER_OBJECT_PATH: ${{ inputs.answer_object_path }}
      PIP_CACHE_DIR: ${{ runner.temp }}/fortune-pip-cache
    steps:
      - name: Validate dispatch input before repository access
        shell: bash
        run: |
          [[ "$RUN_ID" =~ ^[A-Za-z0-9._-]+$ ]]
          [[ "$ANSWER_OBJECT_PATH" == answers/* ]]
          [[ "$ANSWER_OBJECT_PATH" != *".."* ]]

      - name: Checkout runtime repository
        uses: actions/checkout@v4
        with:
          repository: chinaneedM/ziwei-bazi-model
          token: ${{ secrets.RUNTIME_REPO_TOKEN }}
          path: runtime
          persist-credentials: true
          fetch-depth: 1

      - name: Install runtime CLI without answer repository
        run: python -m pip install -e runtime

      - name: Validate immutable freeze before any answer access
        run: >-
          fortune-v1 verify-freeze
          --freeze-receipt "runtime/data/runs/${RUN_ID}/freeze-receipt.json"
          --run-id "$RUN_ID"
          --output "${RUNNER_TEMP}/freeze-validation.json"

      - name: Checkout current answer vault only after freeze validation
        uses: actions/checkout@v4
        with:
          path: answer-vault
          persist-credentials: false
          fetch-depth: 1

      - name: Resolve authorized answer object
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          root = Path("answer-vault/answers").resolve()
          target = Path("answer-vault", os.environ["ANSWER_OBJECT_PATH"]).resolve()
          if root != target and root not in target.parents:
              raise SystemExit("answer path escapes answers/")
          if not target.is_file():
              raise SystemExit("answer object missing")
          PY

      - name: Reject reveal overwrite
        run: test ! -e "runtime/data/reveals/${RUN_ID}.json"

      - name: Grade frozen prediction
        working-directory: runtime
        run: >-
          fortune-v1 grade
          --freeze-receipt "data/runs/${RUN_ID}/freeze-receipt.json"
          --answer "../answer-vault/${ANSWER_OBJECT_PATH}"
          --run-id "$RUN_ID"
          --output "data/reveals/${RUN_ID}.json"

      - name: Remove answer worktree and caches before commit
        shell: bash
        run: |
          rm -rf answer-vault "$PIP_CACHE_DIR" "${RUNNER_TEMP}/freeze-validation.json"
          test ! -e answer-vault

      - name: Commit only the new reveal
        working-directory: runtime
        shell: bash
        run: |
          reveal="data/reveals/${RUN_ID}.json"
          test -f "$reveal"
          git status --porcelain --untracked-files=all | awk '{print $2}' | grep -vxF "$reveal" && exit 1 || true
          git config user.name fortune-reverse-grader
          git config user.email fortune-reverse-grader@users.noreply.github.com
          git add -- "$reveal"
          test "$(git diff --cached --name-only)" = "$reveal"
          git commit -m "grade: ${RUN_ID}"
          git push origin HEAD

      - name: Remove persisted runtime credential
        if: always()
        working-directory: runtime
        shell: bash
        run: |
          git config --unset-all http.https://github.com/.extraheader || true
          rm -rf "$PIP_CACHE_DIR"
