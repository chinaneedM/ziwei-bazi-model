[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "fortune-training-v1"
version = "1.3.0"
description = "Repository-driven blind prediction, staged release, group freeze, reveal, and reasoning-correction training for Ziwei + Bazi"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
fortune-v1 = "fortune_v1.cli:main"
fortune-learning-cycle = "fortune_v1.training_corrected:main"
fortune-group-pipeline = "fortune_v1.end_to_end:main"
fortune-preblind-seal = "fortune_v1.preblind_seal:main"
fortune-repository-delivery = "fortune_v1.repository_delivery_cli:main"
fortune-release-lifecycle = "fortune_v1.release_lifecycle_cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
