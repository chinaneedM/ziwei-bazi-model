name: Recover DEV-GROUP-001 no-answer cases v2

on:
  push:
    branches:
      - runtime/dev-group-001-materialize
  workflow_dispatch:

permissions:
  contents: write

jobs:
  recover:
    if: "!contains(github.event.head_commit.message, '[recovery-v2-result]')"
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: runtime/dev-group-001-materialize
      - name: Run localized hash-gated recovery
        run: python scripts/recover-dev-group-001-v2.py
      - name: Persist branch-only recovery evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "fortune-runtime-recovery"
          git config user.email "fortune-runtime-recovery@users.noreply.github.com"
          git add -f runtime-recovery-v2
          if git diff --cached --quiet; then
            echo "Recovery output unchanged"
            exit 0
          fi
          git commit -m "Persist DEV-GROUP-001 recovery v2 result [recovery-v2-result]"
          git push origin HEAD:runtime/dev-group-001-materialize
