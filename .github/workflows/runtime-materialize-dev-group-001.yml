name: Runtime materialize DEV-GROUP-001

on:
  push:
    branches:
      - runtime/dev-group-001-materialize
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: "!contains(github.event.head_commit.message, '[materialized]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: runtime/dev-group-001-materialize
      - name: Materialize no-answer runtime cases
        shell: bash
        run: |
          set -u
          rm -rf runtime-materialized
          mkdir -p runtime-materialized/DEV-GROUP-001
          : > runtime-materialized/errors.txt
          for p in training-data/DEV-GROUP-001/cases/*; do
            b="$(basename "$p")"
            out="runtime-materialized/DEV-GROUP-001/${b%%.json.gz.b64}.json"
            if [[ "$b" == *.json ]]; then
              out="runtime-materialized/DEV-GROUP-001/$b"
            fi
            if ! python scripts/materialize-training-case.py "$p" --output "$out" 2>>runtime-materialized/errors.txt; then
              echo "FAILED:$p" >> runtime-materialized/errors.txt
              rm -f "$out"
            fi
          done
          python - <<'PY'
          import hashlib, json, pathlib
          root=pathlib.Path('runtime-materialized/DEV-GROUP-001')
          rows=[]
          forbidden=[]
          for p in sorted(root.glob('*.json')):
              raw=p.read_bytes()
              obj=json.loads(raw)
              iso=obj.get('answer_isolation',{})
              if iso.get('answer_payload_present') is not False:
                  forbidden.append(f'{p}:answer_payload_present={iso.get("answer_payload_present")!r}')
              if iso.get('answer_reference_disclosed') is not False:
                  forbidden.append(f'{p}:answer_reference_disclosed={iso.get("answer_reference_disclosed")!r}')
              rows.append({'path':str(p),'bytes':len(raw),'sha256':hashlib.sha256(raw).hexdigest(),'case_id':obj.get('case_id'),'question_count':obj.get('questions',{}).get('question_count')})
          errors=pathlib.Path('runtime-materialized/errors.txt').read_text(encoding='utf-8')
          status='PASS' if not forbidden and not errors.strip() and len(rows)==5 else 'FAIL'
          manifest={'schema':'RUNTIME-MATERIALIZATION-RECEIPT-V1','group_id':'DEV-GROUP-001','files':rows,'forbidden_findings':forbidden,'errors':errors,'status':status}
          pathlib.Path('runtime-materialized/materialization-receipt.json').write_text(json.dumps(manifest,ensure_ascii=False,sort_keys=True,indent=2)+'\n',encoding='utf-8')
          PY
      - name: Persist branch-only diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "fortune-runtime-materializer"
          git config user.email "fortune-runtime-materializer@users.noreply.github.com"
          git add -f runtime-materialized
          git commit -m "Persist DEV-GROUP-001 materialization [materialized]"
          git push origin HEAD:runtime/dev-group-001-materialize
