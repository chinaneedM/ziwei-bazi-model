name: open-source-release-gate

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-open-source-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact release revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run open-source release gate tests
        run: python -m unittest tests.test_public_repository_policy tests.test_open_source_release -v

      - name: Verify software, repository, and knowledge-pack licensing
        env:
          GITHUB_REPOSITORY_VISIBILITY: ${{ github.event.repository.visibility }}
        run: |
          python scripts/verify-public-only-repository.py \
            --root . \
            --visibility "$GITHUB_REPOSITORY_VISIBILITY"
          python scripts/verify-open-source-release.py \
            --root . \
            --visibility "$GITHUB_REPOSITORY_VISIBILITY"
