name: validate-dev-group-002-training-regression-r9

on:
  push:
    paths:
      - reports/dev-group-002/training-regression-r9/**
      - training-data/DEV-GROUP-002/runtime-views/DEV-EXAMPLE-002/**
      - knowledge/base/S04_十二宫主题太极与气数位库.txt
      - knowledge/base/S05_星曜本性辅煞系统与组合条件库.txt
      - knowledge/base/S06_六十星系与十二基础盘库.txt
      - knowledge/base/S07_全星曜与星系入十二宫库.txt
      - knowledge/base/S08_十干四化自化与禄忌线库.txt
      - knowledge/base/S10_紫微岁运应期与动态辅助库.txt
      - knowledge/base/S11_八字干支五行藏干与十神库.txt
      - knowledge/base/S12_八字月令旺衰通根与气势库.txt
      - knowledge/base/S13_八字格局用忌调候与病药库.txt
      - knowledge/base/S14_八字合冲刑害墓库与结构变化库.txt
      - knowledge/base/S15_八字大运流年流月与应期库.txt
      - knowledge/base/S16_八字专题映射与紫微接口库.txt
      - knowledge/base/S17_专题闭合人物太极与动作终点链库.txt
      - knowledge/base/S18_证据归并非法归零与评分分寸库.txt
      - .github/workflows/validate-dev-group-002-training-regression-r9.yml
  pull_request:
    paths:
      - reports/dev-group-002/training-regression-r9/**
      - training-data/DEV-GROUP-002/runtime-views/DEV-EXAMPLE-002/**
      - .github/workflows/validate-dev-group-002-training-regression-r9.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize-and-validate-r9:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Assemble R9 materializer
        run: python reports/dev-group-002/training-regression-r9/bootstrap.py
      - name: Materialize and validate R9 fresh source rebuild
        run: |
          set +e
          python reports/dev-group-002/training-regression-r9/materialize_validate.py \
            --repo-root . --write --validate \
            > reports/dev-group-002/training-regression-r9/execution.log 2>&1
          status=$?
          cat reports/dev-group-002/training-regression-r9/execution.log
          echo "$status" > reports/dev-group-002/training-regression-r9/execution.exit-code
          exit "$status"
      - name: Persist R9 failure receipt
        if: failure() && github.event_name == 'push'
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            reports/dev-group-002/training-regression-r9/materialize_validate.py \
            reports/dev-group-002/training-regression-r9/execution.log \
            reports/dev-group-002/training-regression-r9/execution.exit-code
          if git diff --cached --quiet; then
            echo 'R9 failure receipt already persisted'
          else
            git commit -m 'Record DEV-GROUP-002 R9 execution failure'
            git push origin HEAD:${{ github.ref_name }}
          fi
      - name: Commit deterministic R9 artifacts
        if: success() && github.event_name == 'push'
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm -f \
            reports/dev-group-002/training-regression-r9/execution.log \
            reports/dev-group-002/training-regression-r9/execution.exit-code
          git rm -r --ignore-unmatch \
            reports/dev-group-002/training-regression-r9/source-parts \
            reports/dev-group-002/training-regression-r9/payload
          git add reports/dev-group-002/training-regression-r9/
          if git diff --cached --quiet; then
            echo 'R9 artifacts already frozen'
          else
            git commit -m 'Freeze DEV-GROUP-002 R9 fresh source rebuild'
            git push origin HEAD:${{ github.ref_name }}
          fi
      - name: Upload R9 validation receipt
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dev-group-002-training-regression-r9-validation
          path: reports/dev-group-002/training-regression-r9/validation.json
          if-no-files-found: error
          retention-days: 14
