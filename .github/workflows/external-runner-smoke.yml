name: chat-work-handoff

on:
  workflow_dispatch:
    inputs:
      prediction_path:
        description: Repository-relative PREDICTION-RUN-V1 produced in CHAT or WORK
        required: true
        type: string
      contract_path:
        description: Repository-relative immutable prediction run contract
        required: true
        type: string
      run_id:
        description: New non-overwriting RUN_ID
        required: true
        type: string
      session_mode:
        description: ChatGPT interaction mode used for the prediction
        required: true
        default: CHAT_ONLY
        type: choice
        options:
          - CHAT_ONLY
          - WORK
      session_id:
        description: Non-secret ChatGPT session identifier or case session label
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate-and-freeze:
    runs-on: ubuntu-latest
    env:
      PREDICTION_PATH: ${{ inputs.prediction_path }}
      CONTRACT_PATH: ${{ inputs.contract_path }}
      RUN_ID: ${{ inputs.run_id }}
      SESSION_MODE: ${{ inputs.session_mode }}
      SESSION_ID: ${{ inputs.session_id }}

    steps:
      - name: Checkout runtime repository only
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime package
        run: python -m pip install -e .

      - name: Validate handoff paths and non-overwrite
        shell: bash
        run: |
          set -euo pipefail
          [[ "$PREDICTION_PATH" == data/chat-work-submissions/*.json ]]
          [[ "$CONTRACT_PATH" == data/contracts/*.json ]]
          [[ "$RUN_ID" =~ ^[A-Za-z0-9._-]+$ ]]
          [[ "$SESSION_ID" =~ ^[A-Za-z0-9._:-]+$ ]]
          test -f "$PREDICTION_PATH"
          test -f "$CONTRACT_PATH"
          test ! -e "data/runs/$RUN_ID"
          test ! -e "data/chat-work-imports/$RUN_ID"

      - name: Validate CHAT WORK prediction object
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "data/chat-work-imports/$RUN_ID"
          fortune-v1 chat-work-import \
            --run "$PREDICTION_PATH" \
            --contract "$CONTRACT_PATH" \
            --mode "$SESSION_MODE" \
            --session-id "$SESSION_ID" \
            --output "data/chat-work-imports/$RUN_ID/prediction-run.json" \
            --receipt "data/chat-work-imports/$RUN_ID/handoff-receipt.json"

      - name: Freeze validated prediction before reveal
        shell: bash
        run: |
          set -euo pipefail
          fortune-v1 freeze \
            --run "data/chat-work-imports/$RUN_ID/prediction-run.json" \
            --contract "$CONTRACT_PATH" \
            --frozen-root data/runs

      - name: Publish handoff summary
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          run_id = os.environ["RUN_ID"]
          receipt = json.loads(
              Path(f"data/chat-work-imports/{run_id}/handoff-receipt.json")
              .read_text(encoding="utf-8")
          )
          freeze = json.loads(
              Path(f"data/runs/{run_id}/freeze-receipt.json")
              .read_text(encoding="utf-8")
          )
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("## CHAT/WORK prediction handoff\n\n")
              summary.write(f"- Session mode: `{receipt['session_mode']}`\n")
              summary.write(f"- Handoff status: `{receipt['status']}`\n")
              summary.write(f"- Prediction validation: `{receipt['prediction_run_validation']['status']}`\n")
              summary.write(f"- Dual-track local seals: `{receipt['ziwei_bazi_independent_local_seals']}`\n")
              summary.write(f"- Freeze status: `{freeze['freeze_status']}`\n")
              summary.write(f"- RUN_ID: `{run_id}`\n")
          PY

      - name: Persist immutable handoff and freeze receipts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "fortune-chat-work-handoff"
          git config user.email "fortune-chat-work-handoff@users.noreply.github.com"
          # data/* is intentionally ignored in the repository; force-add only the two validated allowlisted run paths.
          git add -f "data/chat-work-imports/$RUN_ID" "data/runs/$RUN_ID"
          git diff --cached --quiet && { echo "No validated run artifacts staged" >&2; exit 1; }
          git commit -m "Freeze CHAT WORK prediction $RUN_ID [skip ci]"
          git push origin HEAD:main

      - name: Upload handoff receipts
        uses: actions/upload-artifact@v4
        with:
          name: chat-work-handoff-${{ inputs.run_id }}
          path: |
            data/chat-work-imports/${{ inputs.run_id }}/handoff-receipt.json
            data/runs/${{ inputs.run_id }}/freeze-receipt.json
          if-no-files-found: error
          retention-days: 30
