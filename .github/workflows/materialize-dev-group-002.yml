name: materialize-dev-group-002

on:
  push:
    branches:
      - agent/dev-group-002-source-reimport
    paths:
      - ".staging/dev-group-002/**"
      - ".github/workflows/materialize-dev-group-002.yml"
  pull_request:
    branches: [main]
    paths:
      - ".staging/dev-group-002/**"
      - ".github/workflows/materialize-dev-group-002.yml"

permissions:
  contents: write
  actions: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dev-group-002-source-reimport
          fetch-depth: 20

      - name: Verify fragments and materialize source payload
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import hashlib
          import io
          import json
          import tarfile
          from pathlib import Path, PurePosixPath

          manifest_path = Path('.staging/dev-group-002/manifest.json')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          assert manifest['schema'] == 'DEV-GROUP-002-STAGING-PAYLOAD-V2'

          parts = []
          for row in sorted(manifest['parts'], key=lambda item: item['order']):
              restored = bytearray()
              for fragment in row['fragments']:
                  path = Path(fragment['path'])
                  data = path.read_bytes()
                  assert len(data) == fragment['bytes'], (path, len(data), fragment['bytes'])
                  assert hashlib.sha256(data).hexdigest() == fragment['sha256'], path
                  if fragment['encoding'] == 'RAW_BASE64_TEXT':
                      restored.extend(data)
                  elif fragment['encoding'] == 'HEX_OF_BASE64_TEXT':
                      restored.extend(bytes.fromhex(data.decode('ascii').strip()))
                  else:
                      raise AssertionError(f"unsupported fragment encoding: {fragment['encoding']}")
              part = bytes(restored)
              assert len(part) == row['reconstructed_bytes'], row['order']
              assert hashlib.sha256(part).hexdigest() == row['reconstructed_sha256'], row['order']
              parts.append(part)

          encoded = b''.join(parts)
          archive = base64.b64decode(encoded, validate=True)
          assert len(archive) == manifest['archive_bytes']
          assert hashlib.sha256(archive).hexdigest() == manifest['archive_sha256']

          with tarfile.open(fileobj=io.BytesIO(archive), mode='r:gz') as handle:
              members = handle.getmembers()
              for member in members:
                  name = PurePosixPath(member.name)
                  assert not name.is_absolute()
                  assert '..' not in name.parts
                  assert not member.issym() and not member.islnk()
                  assert not str(name).startswith('training-data/private-vault-staging')
              handle.extractall('.', members=members, filter='data')
          PY

      - name: Validate repository checkout bytes
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate-training-group.py \
            training-data/DEV-GROUP-002 \
            --require-ready \
            --receipt /tmp/dev-group-002-integrity-receipt.json
          cat /tmp/dev-group-002-integrity-receipt.json
          python - <<'PY'
          import json
          from pathlib import Path

          integrity_path = Path('/tmp/dev-group-002-integrity-receipt.json')
          integrity = json.loads(integrity_path.read_text(encoding='utf-8'))
          assert integrity['status'] == 'PASS_READY', integrity
          assert integrity['fully_valid_case_count'] == 5, integrity
          assert integrity['failed_case_ids'] == [], integrity
          assert integrity['declared_question_count'] == 25, integrity
          assert integrity['answer_repository_accessed'] is False, integrity

          report_path = Path('reports/dev-group-002/training-data-integrity.json')
          report_path.parent.mkdir(parents=True, exist_ok=True)
          report_path.write_text(
              json.dumps(integrity, ensure_ascii=False, sort_keys=True, indent=2) + '\n',
              encoding='utf-8',
          )

          import_path = Path('reports/dev-group-002/import-receipt.json')
          receipt = json.loads(import_path.read_text(encoding='utf-8'))
          by_case = {row['case_id']: row for row in integrity['cases']}
          for row in receipt['cases']:
              actual = by_case[row['case_id']]
              assert actual['status'] == 'PASS'
              row['actual_stored_bytes'] = actual['actual_stored_bytes']
              row['actual_stored_sha256'] = actual['actual_stored_sha256']
              row['actual_logical_json_sha256'] = actual['actual_logical_json_sha256']
              row['answer_isolation_status'] = 'PASS'
              row['status'] = 'PASS_REPOSITORY_READBACK'
          receipt['repository_readback_status'] = 'PASS'
          receipt['training_data_integrity_status'] = 'PASS_READY'
          receipt['status'] = 'PASS_READY'
          import_path.write_text(
              json.dumps(receipt, ensure_ascii=False, sort_keys=True, indent=2) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Run training-data integrity tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install pytest
          pytest -q tests/test_training_data_integrity.py tests/test_dev_group_002_integrity.py

      - name: Commit validated materialized files with safe branch synchronization
        shell: bash
        run: |
          set -euo pipefail
          test ! -e training-data/private-vault-staging
          rm -rf .staging/dev-group-002
          git config user.name fortune-training-importer
          git config user.email fortune-training-importer@users.noreply.github.com
          git add -A
          test -f training-data/DEV-GROUP-002/cases/DEV-EXAMPLE-001.json
          test -f reports/dev-group-002/training-data-integrity.json
          test ! -e .staging/dev-group-002
          git commit -m "Materialize DEV-GROUP-002 trusted source reimport"
          git fetch origin agent/dev-group-002-source-reimport
          git rebase origin/agent/dev-group-002-source-reimport
          git push origin HEAD:agent/dev-group-002-source-reimport
