name: assemble-dev-group-002

on:
  pull_request:
    branches: [main]
    paths:
      - ".staging/dev-group-002/**"
      - ".github/workflows/assemble-dev-group-002.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Reconstruct hash-gated payload
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, hashlib, json, pathlib, tarfile
          root = pathlib.Path('.')
          stage = root / '.staging/dev-group-002'
          manifest = json.loads((stage / 'manifest.json').read_text(encoding='utf-8'))
          pieces = []
          for part in sorted(manifest['parts'], key=lambda row: row['order']):
              reconstructed = bytearray()
              for fragment in part['fragments']:
                  path = root / fragment['path']
                  raw = path.read_bytes()
                  if len(raw) != fragment['bytes']:
                      raise SystemExit(f"fragment byte mismatch: {path}")
                  if hashlib.sha256(raw).hexdigest() != fragment['sha256']:
                      raise SystemExit(f"fragment hash mismatch: {path}")
                  if fragment['encoding'] == 'RAW_BASE64_TEXT':
                      decoded = raw
                  elif fragment['encoding'] == 'HEX_OF_BASE64_TEXT':
                      decoded = bytes.fromhex(raw.decode('ascii'))
                  else:
                      raise SystemExit(f"unsupported fragment encoding: {fragment['encoding']}")
                  reconstructed.extend(decoded)
              data = bytes(reconstructed)
              if len(data) != part['reconstructed_bytes']:
                  raise SystemExit(f"part byte mismatch: {part['order']}")
              if hashlib.sha256(data).hexdigest() != part['reconstructed_sha256']:
                  raise SystemExit(f"part hash mismatch: {part['order']}")
              pieces.append(data)
          encoded = b''.join(pieces)
          archive = base64.b64decode(encoded, validate=True)
          if len(archive) != manifest['archive_bytes']:
              raise SystemExit('archive byte mismatch')
          if hashlib.sha256(archive).hexdigest() != manifest['archive_sha256']:
              raise SystemExit('archive hash mismatch')
          target = pathlib.Path('/tmp/dev-group-002-payload.tar.gz')
          target.write_bytes(archive)
          with tarfile.open(target, 'r:gz') as tf:
              tf.extractall(root, filter='data')
          PY
      - name: Remove staging transport and validate repository bytes
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .staging/dev-group-002
          rm -f .github/workflows/assemble-dev-group-002.yml
          test ! -e training-data/private-vault-staging
          python scripts/validate-training-group.py \
            training-data/DEV-GROUP-002 \
            --require-ready \
            --receipt reports/dev-group-002/repository-readback-integrity.json
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path('reports/dev-group-002/repository-readback-integrity.json')
          receipt = json.loads(p.read_text(encoding='utf-8'))
          assert receipt['status'] == 'PASS_READY', receipt
          assert receipt['fully_valid_case_count'] == 5, receipt
          assert receipt['failed_case_ids'] == [], receipt
          imp = pathlib.Path('reports/dev-group-002/import-receipt.json')
          body = json.loads(imp.read_text(encoding='utf-8'))
          body['status'] = 'PASS_READY'
          for row in body['cases']:
              row['status'] = 'REPOSITORY_READBACK_PASS'
          imp.write_text(json.dumps(body, ensure_ascii=False, sort_keys=True, indent=2) + '\n', encoding='utf-8')
          PY
      - name: Run integrity regression tests
        run: |
          python -m pip install pytest
          pytest -q tests/test_training_data_integrity.py tests/test_dev_group_002_integrity.py
      - name: Commit only validated final objects
        shell: bash
        run: |
          set -euo pipefail
          git config user.name fortune-training-import
          git config user.email fortune-training-import@users.noreply.github.com
          git add -A
          test -z "$(git diff --cached --name-only | grep '^training-data/private-vault-staging/' || true)"
          git commit -m "Reimport DEV-GROUP-002 from trusted source archives"
          git push origin HEAD
