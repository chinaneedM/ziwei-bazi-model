name: one-time-extract-group-signal-failure

on:
  push:
    paths:
      - '.github/workflows/one-time-extract-group-signal-failure.yml'

permissions:
  actions: read
  contents: write

jobs:
  extract-and-remove-self:
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_RUN_ID: 29681493719
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Extract failed log tail
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/runtime-diagnostics
          gh run view "$TARGET_RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/failed.log
          tail -n 220 /tmp/failed.log > reports/runtime-diagnostics/group-signal-failure-tail.txt

      - name: Remove workflow and commit report
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/one-time-extract-group-signal-failure.yml
          git add reports/runtime-diagnostics/group-signal-failure-tail.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'Record group signal failure tail'
          git push origin "HEAD:${GITHUB_REF_NAME}"
