name: repository-group-postblind-release

on:
  push:
    paths:
      - 'runtime/preblind-seal-requests/*.json'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'runtime/preblind-seal-requests/*.json'
      - 'data/group-clean-starts/*/preblind-seals/*.json'
      - 'src/fortune_v1/end_to_end.py'
      - 'scripts/group-training-pipeline.py'
      - 'tests/test_end_to_end_pipeline.py'
      - '.github/workflows/repository-group-postblind-release.yml'
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'runtime/preblind-seal-requests/*.json'
  workflow_dispatch:
    inputs:
      request_path:
        description: 'Exact runtime/preblind-seal-requests/*.json path'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: repository-group-postblind-release-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: false

jobs:
  release-postblind:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout exact request branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime
        run: python -m pip install -e .

      - name: Resolve exact release requests
        shell: bash
        env:
          MANUAL_REQUEST_PATH: ${{ inputs.request_path }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          : > /tmp/postblind-release-requests.txt
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            request="${MANUAL_REQUEST_PATH}"
            case "$request" in
              runtime/preblind-seal-requests/*.json) ;;
              *) echo "invalid manual request path: $request" >&2; exit 1 ;;
            esac
            test -f "$request"
            printf '%s\n' "$request" > /tmp/postblind-release-requests.txt
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" || "${GITHUB_EVENT_NAME}" == "pull_request_target" ]]; then
            git diff --name-only "${PR_BASE_SHA}...${PR_HEAD_SHA}" -- 'runtime/preblind-seal-requests/*.json' \
              | sort -u > /tmp/postblind-release-requests.txt
            test -s /tmp/postblind-release-requests.txt
          else
            git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" -- 'runtime/preblind-seal-requests/*.json' \
              | sort -u > /tmp/postblind-release-requests.txt
            test -s /tmp/postblind-release-requests.txt
          fi
          while IFS= read -r request; do
            case "$request" in
              runtime/preblind-seal-requests/*.json) ;;
              *) echo "invalid request path: $request" >&2; exit 1 ;;
            esac
            test -f "$request"
          done < /tmp/postblind-release-requests.txt

      - name: Run release gate tests
        run: python -m unittest tests.test_staged_access tests.test_end_to_end_pipeline -v

      - name: Validate dual-track seals and release options
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/postblind-release-results
          while IFS= read -r request; do
            request_name="$(basename "$request" .json)"
            PYTHONPATH=src python scripts/group-training-pipeline.py release-postblind \
              --request "$request" \
              | tee "/tmp/postblind-release-results/${request_name}.json"
          done < /tmp/postblind-release-requests.txt

      - name: Verify group release receipts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          results = sorted(Path('/tmp/postblind-release-results').glob('*.json'))
          if not results:
              raise SystemExit('no postblind release result')
          for path in results:
              result = json.loads(path.read_text(encoding='utf-8'))
              if result.get('status') != 'POSTBLIND_OPTION_CHALLENGE_RELEASED':
                  raise SystemExit(f'group postblind release failed: {result}')
              if result.get('answer_data_available') is not False:
                  raise SystemExit('answer data became available during option release')
              if result.get('case_count') != len(result.get('cases', [])):
                  raise SystemExit('case release count mismatch')
              for row in result.get('cases', []):
                  receipt = Path(row['receipt_path'])
                  if not receipt.is_file():
                      raise SystemExit(f'missing case release receipt: {receipt}')
                  body = json.loads(receipt.read_text(encoding='utf-8'))
                  if body.get('status') != 'POSTBLIND_OPTION_CHALLENGE_RELEASED':
                      raise SystemExit(f'invalid case release receipt: {receipt}')
                  if body.get('option_access_before_all_seals') is not False:
                      raise SystemExit(f'pre-seal option access detected: {receipt}')
          PY

      - name: Commit immutable postblind access receipts
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/group-clean-starts
          if git diff --cached --quiet; then
            echo 'No postblind release objects to commit.'
            exit 0
          fi
          git commit -m 'Release machine-gated postblind stage'
          git push origin "HEAD:${TARGET_BRANCH}"
