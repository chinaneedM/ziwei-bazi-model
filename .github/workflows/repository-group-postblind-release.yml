name: repository-group-postblind-release

on:
  push:
    paths:
      - 'runtime/preblind-seal-requests/*.json'
  workflow_dispatch:
    inputs:
      request_path:
        description: 'Exact runtime/preblind-seal-requests/*.json path'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: repository-group-postblind-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-postblind:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout public runtime repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime
        run: python -m pip install -e .

      - name: Resolve exact release requests
        shell: bash
        env:
          MANUAL_REQUEST_PATH: ${{ inputs.request_path }}
        run: |
          set -euo pipefail
          : > /tmp/postblind-release-requests.txt
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            request="${MANUAL_REQUEST_PATH}"
            case "$request" in
              runtime/preblind-seal-requests/*.json) ;;
              *) echo "invalid manual request path: $request" >&2; exit 1 ;;
            esac
            test -f "$request"
            printf '%s\n' "$request" > /tmp/postblind-release-requests.txt
          else
            git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" -- 'runtime/preblind-seal-requests/*.json' \
              | sort -u > /tmp/postblind-release-requests.txt
            test -s /tmp/postblind-release-requests.txt
          fi
          while IFS= read -r request; do
            case "$request" in
              runtime/preblind-seal-requests/*.json) ;;
              *) echo "invalid request path: $request" >&2; exit 1 ;;
            esac
            test -f "$request"
          done < /tmp/postblind-release-requests.txt

      - name: Run seal and release gate tests
        run: python -m unittest tests.test_staged_access tests.test_preblind_seal tests.test_end_to_end_pipeline -v

      - name: Machine-build dual-track seals and release options
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/preblind-seal-results /tmp/derived-release-requests /tmp/postblind-release-results
          while IFS= read -r request; do
            request_name="$(basename "$request" .json)"
            derived="/tmp/derived-release-requests/${request_name}.json"
            PYTHONPATH=src python scripts/prepare-preblind-seals.py \
              --request "$request" \
              --derived-request "$derived" \
              | tee "/tmp/preblind-seal-results/${request_name}.json"
            PYTHONPATH=src python scripts/group-training-pipeline.py release-postblind \
              --request "$derived" \
              | tee "/tmp/postblind-release-results/${request_name}.json"
          done < /tmp/postblind-release-requests.txt

      - name: Verify machine seals and group release receipts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          seal_results = sorted(Path('/tmp/preblind-seal-results').glob('*.json'))
          release_results = sorted(Path('/tmp/postblind-release-results').glob('*.json'))
          if not seal_results or len(seal_results) != len(release_results):
              raise SystemExit('seal/release result count mismatch')
          for path in seal_results:
              result = json.loads(path.read_text(encoding='utf-8'))
              if result.get('status') != 'PASS':
                  raise SystemExit(f'preblind seal materialization failed: {result}')
              if result.get('answer_data_available') is not False:
                  raise SystemExit('answer data became available during sealing')
              if result.get('case_count') != len(result.get('seals', [])):
                  raise SystemExit('seal case count mismatch')
              for row in result.get('seals', []):
                  bundle = Path(row['path'])
                  if not bundle.is_file():
                      raise SystemExit(f'missing seal bundle: {bundle}')
                  body = json.loads(bundle.read_text(encoding='utf-8'))
                  if body.get('schema') != 'PREBLIND-SEAL-BUNDLE-V1' or body.get('status') != 'PASS':
                      raise SystemExit(f'invalid seal bundle: {bundle}')
                  if body.get('option_access_before_all_seals') is not False:
                      raise SystemExit(f'pre-seal option access detected: {bundle}')
          for path in release_results:
              result = json.loads(path.read_text(encoding='utf-8'))
              if result.get('status') != 'POSTBLIND_OPTION_CHALLENGE_RELEASED':
                  raise SystemExit(f'group postblind release failed: {result}')
              if result.get('answer_data_available') is not False:
                  raise SystemExit('answer data became available during option release')
              if result.get('case_count') != len(result.get('cases', [])):
                  raise SystemExit('case release count mismatch')
              for row in result.get('cases', []):
                  receipt = Path(row['receipt_path'])
                  if not receipt.is_file():
                      raise SystemExit(f'missing case release receipt: {receipt}')
                  body = json.loads(receipt.read_text(encoding='utf-8'))
                  if body.get('status') != 'POSTBLIND_OPTION_CHALLENGE_RELEASED':
                      raise SystemExit(f'invalid case release receipt: {receipt}')
                  if body.get('option_access_before_all_seals') is not False:
                      raise SystemExit(f'pre-seal option access detected: {receipt}')
          PY

      - name: Commit immutable seals and postblind access receipts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/group-clean-starts
          if git diff --cached --quiet; then
            echo 'No preblind seal or postblind release objects to commit.'
            exit 0
          fi
          git commit -m 'Seal preblind models and release postblind stage'
          git push origin "HEAD:${GITHUB_REF_NAME}"
