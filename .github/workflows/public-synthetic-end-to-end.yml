name: public-synthetic-end-to-end

on:
  push:
    paths:
      - 'runtime/public-synthetic-e2e-requests/*.json'
  workflow_dispatch:
    inputs:
      request_path:
        description: 'Exact runtime/public-synthetic-e2e-requests/*.json path'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: public-synthetic-end-to-end-${{ github.ref }}
  cancel-in-progress: false

jobs:
  execute-and-freeze-receipt:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime
        run: python -m pip install -e .

      - name: Resolve exact synthetic requests
        shell: bash
        env:
          MANUAL_REQUEST_PATH: ${{ inputs.request_path }}
        run: |
          set -euo pipefail
          : > /tmp/public-synthetic-e2e-requests.txt
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            request="${MANUAL_REQUEST_PATH}"
            case "$request" in
              runtime/public-synthetic-e2e-requests/*.json) ;;
              *) echo "invalid manual request path: $request" >&2; exit 1 ;;
            esac
            test -f "$request"
            printf '%s\n' "$request" > /tmp/public-synthetic-e2e-requests.txt
          else
            git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" -- 'runtime/public-synthetic-e2e-requests/*.json' \
              | sort -u > /tmp/public-synthetic-e2e-requests.txt
            test -s /tmp/public-synthetic-e2e-requests.txt
          fi

      - name: Execute frozen public synthetic end-to-end chain
        shell: bash
        env:
          FORTUNE_PUBLIC_ANSWER_KEY: ${{ secrets.FORTUNE_PUBLIC_ANSWER_KEY }}
        run: |
          set -euo pipefail
          test -n "$FORTUNE_PUBLIC_ANSWER_KEY"
          mkdir -p /tmp/public-synthetic-e2e-results
          while IFS= read -r request; do
            name="$(basename "$request" .json)"
            PYTHONPATH=src python scripts/run-public-synthetic-e2e.py \
              --request "$request" \
              --repository-root . \
              --code-commit "$GITHUB_SHA" \
              | tee "/tmp/public-synthetic-e2e-results/${name}.json"
          done < /tmp/public-synthetic-e2e-requests.txt

      - name: Verify receipts and repository write allowlist
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          results = sorted(Path('/tmp/public-synthetic-e2e-results').glob('*.json'))
          if not results:
              raise SystemExit('synthetic E2E result missing')
          for result_path in results:
              result = json.loads(result_path.read_text(encoding='utf-8'))
              if result.get('status') != 'PASS':
                  raise SystemExit(f'synthetic E2E did not PASS: {result}')
              if result.get('group_freeze_status') != 'GROUP_PREDICTION_FREEZE_PASS':
                  raise SystemExit('group freeze status invalid')
              if result.get('all_predictions_frozen_before_reveal') is not True:
                  raise SystemExit('freeze ordering invalid')
              if result.get('answer_data_available_before_group_freeze') is not False:
                  raise SystemExit('answer isolation invalid')
              if result.get('literal_replay_status') != 'PASS':
                  raise SystemExit('literal replay invalid')
              if result.get('learning_status') != 'LEARNING_ACTIVE':
                  raise SystemExit('learning intake inactive')
              if result.get('transient_plaintext_destroyed') is not True:
                  raise SystemExit('plaintext cleanup invalid')
              if result.get('secret_value_recorded') is not False:
                  raise SystemExit('secret recording policy invalid')
          PY

          git add public-answer-vault/encrypted reports/open-source-migration/public-synthetic-e2e
          changed="$(git diff --cached --name-only)"
          test -n "$changed"
          while IFS= read -r path; do
            case "$path" in
              public-answer-vault/encrypted/*.json.fernet) ;;
              reports/open-source-migration/public-synthetic-e2e/*.json) ;;
              *) echo "forbidden synthetic E2E write: $path" >&2; exit 1 ;;
            esac
          done <<< "$changed"
          if find . -path './.git' -prune -o -type f \( -name '*.decrypted-answer.json' -o -name '*.answer-key' \) -print | grep -q .; then
            echo 'forbidden plaintext/key file found' >&2
            exit 1
          fi

      - name: Commit immutable public synthetic E2E objects
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'Record public synthetic end-to-end PASS receipt'
          git push origin "HEAD:${GITHUB_REF_NAME}"
