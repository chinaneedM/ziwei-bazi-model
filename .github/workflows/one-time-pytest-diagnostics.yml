name: one-time-pytest-diagnostics

on:
  push:
    paths:
      - '.github/workflows/one-time-pytest-diagnostics.yml'

permissions:
  contents: write

jobs:
  diagnose-and-remove-self:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout candidate branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pytest and write compact report
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e . pytest >/tmp/pytest-install.log 2>&1
          set +e
          pytest -q >/tmp/pytest.log 2>&1
          status=$?
          set -e
          mkdir -p reports/open-source-migration
          {
            echo '# Pytest diagnostic'
            echo
            echo "Exit status: $status"
            echo
            echo '```text'
            tail -n 240 /tmp/pytest.log
            echo '```'
          } > reports/open-source-migration/pytest-diagnostic.md

      - name: Remove one-time workflow and commit diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/one-time-pytest-diagnostics.yml
          git add reports/open-source-migration/pytest-diagnostic.md
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'Record pytest diagnostic'
          git push origin "HEAD:${GITHUB_REF_NAME}"
