name: one-time-find-legacy-install-writer

on:
  push:
    paths:
      - '.github/workflows/one-time-find-legacy-install-writer.yml'

permissions:
  contents: write

jobs:
  discover-and-remove-self:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout activation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Discover legacy install writers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/open-source-migration
          python - <<'PY'
          import json
          from pathlib import Path

          needles = [
              'Record installation validation receipts',
              'install-receipt.json',
              'installation_check(',
              'fortune-v1 install-check',
              'make install-check',
              'SCHEMA_DEFINED_NOT_INSTALLED',
              'INSTALLATION-RECEIPT-V2',
          ]
          roots = [Path('.github/workflows'), Path('scripts'), Path('src'), Path('Makefile')]
          matches = []
          for root in roots:
              paths = [root] if root.is_file() else sorted(p for p in root.rglob('*') if p.is_file())
              for path in paths:
                  text = path.read_text(encoding='utf-8', errors='ignore')
                  rows = []
                  for number, line in enumerate(text.splitlines(), 1):
                      hit = [needle for needle in needles if needle in line]
                      if hit:
                          rows.append({'line': number, 'text': line, 'needles': hit})
                  if rows:
                      matches.append({'path': path.as_posix(), 'matches': rows})

          commit = __import__('subprocess').check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
          result = {
              'schema': 'LEGACY-INSTALL-WRITER-DISCOVERY-V1',
              'status': 'DISCOVERY_COMPLETE',
              'commit': commit,
              'match_file_count': len(matches),
              'matches': matches,
          }
          Path('reports/open-source-migration/legacy-install-writer-discovery.json').write_text(
              json.dumps(result, ensure_ascii=False, sort_keys=True, indent=2) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Remove one-time workflow and commit report
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/one-time-find-legacy-install-writer.yml
          git add reports/open-source-migration/legacy-install-writer-discovery.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'Record legacy install writer discovery'
          git push origin "HEAD:${GITHUB_REF_NAME}"
