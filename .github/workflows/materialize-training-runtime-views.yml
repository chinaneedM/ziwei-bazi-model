name: materialize-training-runtime-views

on:
  workflow_dispatch:
    inputs:
      group_id:
        description: Training group to materialize
        required: true
        default: DEV-GROUP-002
  push:
    paths:
      - .github/workflows/materialize-training-runtime-views.yml
  pull_request:

permissions:
  contents: write

jobs:
  materialize:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      - name: Materialize or validate line-readable answer-free views
        env:
          GROUP_ID: ${{ inputs.group_id || 'DEV-GROUP-002' }}
        run: |
          set -euo pipefail
          out="training-data/${GROUP_ID}/runtime-views"
          if [ ! -e "$out" ]; then
            args=()
            for file in training-data/${GROUP_ID}/cases/*.json; do
              args+=(--case "$file")
            done
            python scripts/materialize-training-runtime-view.py \
              "${args[@]}" \
              --output-root "$out"
          fi
          python -m unittest tests.test_materialize_training_runtime_view -v
          test "$(find "$out" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 5
      - name: Commit materialized views
        env:
          GROUP_ID: ${{ inputs.group_id || 'DEV-GROUP-002' }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add "training-data/${GROUP_ID}/runtime-views"
          git diff --cached --quiet && exit 0
          git commit -m "Materialize ${GROUP_ID} runtime views"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git push origin "HEAD:${{ github.head_ref }}"
          else
            git push
          fi
