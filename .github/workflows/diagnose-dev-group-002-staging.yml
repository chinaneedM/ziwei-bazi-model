name: diagnose-dev-group-002-staging

on:
  pull_request:
    branches: [main]
    paths:
      - ".staging/dev-group-002/**"
      - ".github/workflows/diagnose-dev-group-002-staging.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dev-group-002-source-reimport
          fetch-depth: 1
      - name: Persist staging byte and hash metrics only
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import hashlib
          import json
          from pathlib import Path

          manifest = json.loads(Path('.staging/dev-group-002/manifest.json').read_text(encoding='utf-8'))
          report = {
              'schema': 'DEV-GROUP-002-STAGING-DIAGNOSTIC-V1',
              'fragments': [],
              'parts': [],
              'status': 'PASS',
          }
          parts = []
          failed = False
          for row in sorted(manifest['parts'], key=lambda item: item['order']):
              restored = bytearray()
              for fragment in row['fragments']:
                  path = Path(fragment['path'])
                  data = path.read_bytes()
                  actual_sha = hashlib.sha256(data).hexdigest()
                  ok = len(data) == fragment['bytes'] and actual_sha == fragment['sha256']
                  report['fragments'].append({
                      'path': str(path),
                      'encoding': fragment['encoding'],
                      'actual_bytes': len(data),
                      'expected_bytes': fragment['bytes'],
                      'actual_sha256': actual_sha,
                      'expected_sha256': fragment['sha256'],
                      'status': 'PASS' if ok else 'FAIL',
                  })
                  failed = failed or not ok
                  if fragment['encoding'] == 'RAW_BASE64_TEXT':
                      restored.extend(data)
                  elif fragment['encoding'] == 'HEX_OF_BASE64_TEXT':
                      try:
                          restored.extend(bytes.fromhex(data.decode('ascii').strip()))
                      except Exception as exc:
                          report['fragments'][-1]['decode_error'] = f'{type(exc).__name__}:{exc}'
                          report['fragments'][-1]['status'] = 'FAIL'
                          failed = True
                  else:
                      report['fragments'][-1]['decode_error'] = 'UNSUPPORTED_ENCODING'
                      report['fragments'][-1]['status'] = 'FAIL'
                      failed = True
              part = bytes(restored)
              actual_sha = hashlib.sha256(part).hexdigest()
              ok = len(part) == row['reconstructed_bytes'] and actual_sha == row['reconstructed_sha256']
              report['parts'].append({
                  'order': row['order'],
                  'actual_bytes': len(part),
                  'expected_bytes': row['reconstructed_bytes'],
                  'actual_sha256': actual_sha,
                  'expected_sha256': row['reconstructed_sha256'],
                  'status': 'PASS' if ok else 'FAIL',
              })
              failed = failed or not ok
              parts.append(part)
          encoded = b''.join(parts)
          report['encoded'] = {
              'bytes': len(encoded),
              'sha256': hashlib.sha256(encoded).hexdigest(),
          }
          try:
              archive = base64.b64decode(encoded, validate=True)
              archive_sha = hashlib.sha256(archive).hexdigest()
              ok = len(archive) == manifest['archive_bytes'] and archive_sha == manifest['archive_sha256']
              report['archive'] = {
                  'actual_bytes': len(archive),
                  'expected_bytes': manifest['archive_bytes'],
                  'actual_sha256': archive_sha,
                  'expected_sha256': manifest['archive_sha256'],
                  'status': 'PASS' if ok else 'FAIL',
              }
              failed = failed or not ok
          except Exception as exc:
              report['archive'] = {'status': 'FAIL', 'decode_error': f'{type(exc).__name__}:{exc}'}
              failed = True
          report['status'] = 'FAIL' if failed else 'PASS'
          target = Path('reports/dev-group-002/staging-diagnostic.json')
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(json.dumps(report, ensure_ascii=False, sort_keys=True, indent=2) + '\n', encoding='utf-8')
          PY
          git config user.name fortune-staging-diagnostic
          git config user.email fortune-staging-diagnostic@users.noreply.github.com
          git add reports/dev-group-002/staging-diagnostic.json
          git commit -m "Record DEV-GROUP-002 staging diagnostic [skip ci]" || exit 0
          git push origin HEAD:agent/dev-group-002-source-reimport
