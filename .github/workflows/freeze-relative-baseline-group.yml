name: freeze-relative-baseline-group

on:
  workflow_dispatch:
    inputs:
      prediction_path:
        description: Repository-relative RELATIVE-BASELINE-GROUP-V1 file
        required: true
        default: runs/DEV-GROUP-002/DEV-GROUP-002-BASELINE-RUN-001/prediction.json
        type: string
  push:
    branches: [main]
    paths:
      - runs/DEV-GROUP-002/**/prediction.json
      - scripts/freeze-relative-baseline-group.py

permissions:
  contents: write

jobs:
  validate-and-freeze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve prediction path
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            path='${{ inputs.prediction_path }}'
          else
            path='runs/DEV-GROUP-002/DEV-GROUP-002-BASELINE-RUN-001/prediction.json'
          fi
          [[ "$path" == runs/DEV-GROUP-002/*/prediction.json ]]
          test -f "$path"
          echo "path=$path" >> "$GITHUB_OUTPUT"
      - name: Validate and freeze low-validity relative baseline
        shell: bash
        run: |
          set -euo pipefail
          python scripts/freeze-relative-baseline-group.py \
            --prediction '${{ steps.resolve.outputs.path }}' \
            --frozen-root data/relative-baseline-runs \
            > reports/dev-group-002-relative-baseline-freeze.json
      - name: Persist immutable baseline and receipt
        shell: bash
        run: |
          set -euo pipefail
          run_id=$(python - <<'PY'
          import json
          from pathlib import Path
          obj=json.loads(Path('${{ steps.resolve.outputs.path }}').read_text(encoding='utf-8'))
          print(obj['run_id'])
          PY
          )
          git config user.name fortune-relative-baseline
          git config user.email fortune-relative-baseline@users.noreply.github.com
          git add -f "data/relative-baseline-runs/$run_id" reports/dev-group-002-relative-baseline-freeze.json
          git diff --cached --quiet && { echo 'No freeze artifacts staged' >&2; exit 1; }
          git commit -m "Freeze relative baseline group $run_id [skip ci]"
          git push origin HEAD:main
