name: validate-dev-group-002-training-regression-r5

on:
  push:
    paths:
      - reports/dev-group-002/training-regression-r5/**
      - reports/dev-group-002/training-regression-r1/manifest.json
      - reports/dev-group-002/training-regression-r2/active-whitelist-receipt.json
      - reports/dev-group-002/training-regression-r3/progress.json
      - reports/dev-group-002/training-regression-r4/compact-manifest.json
      - .github/workflows/validate-dev-group-002-training-regression-r5.yml
  pull_request:
    paths:
      - reports/dev-group-002/training-regression-r5/**
      - reports/dev-group-002/training-regression-r1/manifest.json
      - reports/dev-group-002/training-regression-r2/active-whitelist-receipt.json
      - reports/dev-group-002/training-regression-r3/progress.json
      - reports/dev-group-002/training-regression-r4/compact-manifest.json
      - .github/workflows/validate-dev-group-002-training-regression-r5.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize-and-validate-r5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Materialize frozen R5 objects
        run: |
          python reports/dev-group-002/training-regression-r5/materialize_validate.py \
            --repo-root . --write --validate
      - name: Commit deterministic R5 artifacts
        if: github.event_name == 'push'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add reports/dev-group-002/training-regression-r5/
          if git diff --cached --quiet; then
            echo 'R5 artifacts already frozen'
          else
            git commit -m 'Freeze DEV-GROUP-002 R5 execution audit'
            git push origin HEAD:${{ github.ref_name }}
          fi
      - name: Upload R5 validation receipt
        uses: actions/upload-artifact@v4
        with:
          name: dev-group-002-training-regression-r5-validation
          path: reports/dev-group-002/training-regression-r5/validation.json
          if-no-files-found: error
          retention-days: 14
