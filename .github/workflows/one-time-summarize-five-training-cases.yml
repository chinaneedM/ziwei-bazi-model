name: one-time-summarize-five-training-cases

on:
  push:
    paths:
      - '.github/workflows/one-time-summarize-five-training-cases.yml'

permissions:
  contents: write

jobs:
  summarize-and-remove-self:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Build compact five-case summary
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          source = json.loads(Path('reports/training-example-inventory/five-case-asset-map.json').read_text(encoding='utf-8'))
          rows = []
          for case_id in source['case_ids']:
              item = source['summary'][case_id]
              assets = item['assets']
              input_assets = [r['path'] for r in assets if r['category'] == 'INPUT_OR_PREBLIND']
              question_assets = [r['path'] for r in assets if r['category'] == 'QUESTION_OR_OPTIONS']
              answer_assets = [r['path'] for r in assets if r['category'] == 'ANSWER_OR_POSTREVEAL']
              rows.append({
                  'case_id': case_id,
                  'asset_count': item['asset_count'],
                  'has_input_or_preblind': bool(input_assets),
                  'has_question_or_options': bool(question_assets),
                  'has_answer_or_postreveal': bool(answer_assets),
                  'sample_input_assets': input_assets[:5],
                  'sample_question_assets': question_assets[:5],
                  'sample_answer_assets': answer_assets[:5],
                  'blind_reuse_status': 'TRAINING_REPLAY_ONLY_NOT_NEW_BLIND_SCORE' if answer_assets else 'ELIGIBILITY_REQUIRES_FRESH_GATE',
              })
          result = {
              'schema': 'FIVE-TRAINING-CASE-COMPACT-SUMMARY-V1',
              'status': 'PASS',
              'case_count': len(rows),
              'rows': rows,
              'group_rule': 'These are registered repository assets. Existing revealed-answer cases may be replayed for training/regression but cannot be counted again as first-blind accuracy.',
          }
          out = Path('reports/training-example-inventory/five-case-compact-summary.json')
          out.write_text(json.dumps(result, ensure_ascii=False, sort_keys=True, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Remove one-time workflow and commit summary
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/one-time-summarize-five-training-cases.yml
          git add reports/training-example-inventory/five-case-compact-summary.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'Summarize five registered training cases'
          git push origin "HEAD:${GITHUB_REF_NAME}"
