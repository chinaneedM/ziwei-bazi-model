name: repository-group-clean-start

on:
  push:
    paths:
      - 'runtime/clean-start-requests/*.json'
  workflow_dispatch:
    inputs:
      request_path:
        description: 'Exact runtime/clean-start-requests/*.json path'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: repository-group-clean-start-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-clean-start:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout public runtime repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime
        run: python -m pip install -e . pytest

      - name: Resolve exact request files
        shell: bash
        env:
          MANUAL_REQUEST_PATH: ${{ inputs.request_path }}
        run: |
          set -euo pipefail
          : > /tmp/clean-start-requests.txt
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            request="${MANUAL_REQUEST_PATH}"
            case "$request" in
              runtime/clean-start-requests/*.json) ;;
              *) echo "invalid manual request path: $request" >&2; exit 1 ;;
            esac
            test -f "$request"
            printf '%s\n' "$request" > /tmp/clean-start-requests.txt
          else
            git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" -- 'runtime/clean-start-requests/*.json' \
              | sort -u > /tmp/clean-start-requests.txt
            test -s /tmp/clean-start-requests.txt
          fi
          while IFS= read -r request; do
            case "$request" in
              runtime/clean-start-requests/*.json) ;;
              *) echo "invalid request path: $request" >&2; exit 1 ;;
            esac
            test -f "$request"
          done < /tmp/clean-start-requests.txt

      - name: Verify the exact execution commit before clean start
        shell: bash
        run: |
          set -euo pipefail
          mode=candidate
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            mode=main
          fi
          make install-check \
            PYTHON=python \
            REPOSITORY_VISIBILITY=public \
            EXPECTED_COMMIT="$GITHUB_SHA" \
            ACTIVATION_MODE="$mode" \
            INSTALL_RECEIPT=/tmp/clean-start-install-receipt.json \
            ACTIVATED_STATE_RECEIPT=/tmp/clean-start-activated-state.json

      - name: Materialize or validate staged clean starts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/clean-start-results /tmp/clean-start-validations
          while IFS= read -r request; do
            request_name="$(basename "$request" .json)"
            group_run_id="$(python -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["group_run_id"])' "$request")"
            existing="data/group-clean-starts/${group_run_id}/clean-start.json"
            if [[ -f "$existing" ]]; then
              PYTHONPATH=src python scripts/group-training-pipeline.py validate-clean-start \
                --clean-start "$existing" \
                --output "/tmp/clean-start-validations/${request_name}.json"
              python - "$existing" <<'PY' | tee "/tmp/clean-start-results/${request_name}.json"
          import hashlib
          import json
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          result = json.loads(path.read_text(encoding='utf-8'))
          result['clean_start_path'] = str(path)
          result['clean_start_sha256'] = hashlib.sha256(path.read_bytes()).hexdigest()
          print(json.dumps(result, ensure_ascii=False, sort_keys=True, indent=2))
          PY
            else
              PYTHONPATH=src python scripts/create-staged-group-clean-start.py create-from-request \
                --request "$request" \
                --current-group-manifest CURRENT_GROUP_MANIFEST \
                --runtime-preflight-receipt /tmp/clean-start-install-receipt.json \
                | tee "/tmp/clean-start-results/${request_name}.json"
            fi
          done < /tmp/clean-start-requests.txt

      - name: Verify generated staged clean starts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          from fortune_v1.end_to_end import validate_staged_clean_start

          results = sorted(Path('/tmp/clean-start-results').glob('*.json'))
          if not results:
              raise SystemExit('no clean-start results generated')
          for result_path in results:
              result = json.loads(result_path.read_text(encoding='utf-8'))
              if result.get('status') != 'READY_FOR_PREBLIND_MODELING':
                  raise SystemExit(f"unexpected status in {result_path}: {result.get('status')}")
              if result.get('answer_data_available') is not False:
                  raise SystemExit(f'answer data available in {result_path}')
              preflight = result.get('runtime_preflight_receipt')
              if not isinstance(preflight, dict) or preflight.get('failure_count') != 0:
                  raise SystemExit(f'exact-commit runtime preflight not bound: {result_path}')
              if preflight.get('code_commit') != result.get('installation_state', {}).get('code_commit'):
                  raise SystemExit(f'runtime preflight commit mismatch: {result_path}')
              clean_path = Path(result['clean_start_path'])
              expected = Path('data/group-clean-starts') / result['group_run_id'] / 'clean-start.json'
              if clean_path != expected:
                  raise SystemExit(f'unexpected clean-start path: {clean_path} != {expected}')
              receipt = validate_staged_clean_start(clean_path)
              if receipt.get('status') != 'PASS':
                  raise SystemExit(f'staged clean-start validation failed: {receipt}')
          PY

      - name: Build and verify staged runtime packets in the same request transaction
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/runtime-packet-results
          while IFS= read -r request; do
            request_name="$(basename "$request" .json)"
            group_run_id="$(python -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["group_run_id"])' "$request")"
            clean_start="data/group-clean-starts/${group_run_id}/clean-start.json"
            derived="data/group-clean-starts/${group_run_id}/control/runtime-packet-request.json"
            PYTHONPATH=src python scripts/create-runtime-packet-request.py \
              --clean-start "$clean_start" \
              --output "$derived"
            PYTHONPATH=src python scripts/create-staged-group-runtime-packets.py \
              --request "$derived" \
              --max-per-question 8 \
              | tee "/tmp/runtime-packet-results/${request_name}.json"
          done < /tmp/clean-start-requests.txt
          python - <<'PY'
          import json
          from pathlib import Path

          results = sorted(Path('/tmp/runtime-packet-results').glob('*.json'))
          if not results:
              raise SystemExit('no runtime packet result')
          for path in results:
              result = json.loads(path.read_text(encoding='utf-8'))
              if result.get('status') != 'READY_FOR_PREBLIND_MODELING':
                  raise SystemExit(f'runtime packets not PREBLIND ready: {result}')
              if result.get('answer_data_available') is not False or result.get('option_visibility') != 'WITHHELD':
                  raise SystemExit(f'runtime packet isolation failed: {result}')
              transport = json.loads(Path(result['transport_plan_path']).read_text(encoding='utf-8'))
              if transport.get('status') != 'READY_FOR_PREBLIND_MODELING':
                  raise SystemExit(f'transport not PREBLIND ready: {transport}')
              if transport.get('postblind_release_receipt_required') is not True:
                  raise SystemExit('postblind receipt gate missing')
          PY

      - name: Commit immutable staged clean-start and runtime packet objects
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/group-clean-starts
          if git diff --cached --quiet; then
            echo 'No new clean-start objects to commit.'
            exit 0
          fi
          git commit -m 'Materialize repository staged clean start'
          git push origin "HEAD:${GITHUB_REF_NAME}"
