name: repository-group-clean-start

on:
  push:
    paths:
      - 'runtime/clean-start-requests/*.json'

permissions:
  contents: write

concurrency:
  group: repository-group-clean-start-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-clean-start:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout triggering branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime
        run: python -m pip install -e .

      - name: Resolve exact request files
        id: requests
        shell: bash
        run: |
          set -euo pipefail
          git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" -- 'runtime/clean-start-requests/*.json' \
            | sort -u > /tmp/clean-start-requests.txt
          test -s /tmp/clean-start-requests.txt
          while IFS= read -r request; do
            test -f "$request"
          done < /tmp/clean-start-requests.txt

      - name: Run clean-start validation tests
        run: python -m unittest tests.test_clean_start -v

      - name: Materialize requested clean starts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/clean-start-results
          while IFS= read -r request; do
            request_name="$(basename "$request" .json)"
            PYTHONPATH=src python scripts/create-group-clean-start.py create-from-request \
              --request "$request" \
              --current-group-manifest CURRENT_GROUP_MANIFEST \
              | tee "/tmp/clean-start-results/${request_name}.json"
          done < /tmp/clean-start-requests.txt

      - name: Verify generated clean starts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          results = sorted(Path('/tmp/clean-start-results').glob('*.json'))
          if not results:
              raise SystemExit('no clean-start results generated')
          for result_path in results:
              result = json.loads(result_path.read_text(encoding='utf-8'))
              if result.get('status') != 'READY_FOR_CLEAN_GROUP_PREDICTION':
                  raise SystemExit(f"unexpected status in {result_path}: {result.get('status')}")
              if result.get('answer_data_available') is not False:
                  raise SystemExit(f'answer data available in {result_path}')
              clean_path = Path(result['clean_start_path'])
              if not clean_path.is_file():
                  raise SystemExit(f'missing generated clean start: {clean_path}')
              expected = Path('data/group-clean-starts') / result['group_run_id'] / 'clean-start.json'
              if clean_path != expected:
                  raise SystemExit(f'unexpected clean-start path: {clean_path} != {expected}')
          PY

      - name: Commit immutable clean-start objects
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/group-clean-starts
          if git diff --cached --quiet; then
            echo 'No new clean-start objects to commit.'
            exit 0
          fi
          git commit -m 'Materialize repository clean start'
          git push origin "HEAD:${GITHUB_REF_NAME}"
