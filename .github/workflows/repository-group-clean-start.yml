name: repository-group-clean-start

on:
  push:
    paths:
      - 'runtime/clean-start-requests/*.json'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'runtime/clean-start-requests/*.json'
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'runtime/clean-start-requests/*.json'
  workflow_dispatch:
    inputs:
      request_path:
        description: 'Exact runtime/clean-start-requests/*.json path'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: repository-group-clean-start-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: false

jobs:
  create-clean-start:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact request branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime
        run: python -m pip install -e .

      - name: Resolve exact request files
        id: requests
        shell: bash
        env:
          MANUAL_REQUEST_PATH: ${{ inputs.request_path }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          : > /tmp/clean-start-requests.txt
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            request="${MANUAL_REQUEST_PATH}"
            case "$request" in
              runtime/clean-start-requests/*.json) ;;
              *) echo "invalid manual request path: $request" >&2; exit 1 ;;
            esac
            test -f "$request"
            printf '%s\n' "$request" > /tmp/clean-start-requests.txt
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" || "${GITHUB_EVENT_NAME}" == "pull_request_target" ]]; then
            git diff --name-only "${PR_BASE_SHA}...${PR_HEAD_SHA}" -- 'runtime/clean-start-requests/*.json' \
              | sort -u > /tmp/clean-start-requests.txt
            test -s /tmp/clean-start-requests.txt
          else
            git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" -- 'runtime/clean-start-requests/*.json' \
              | sort -u > /tmp/clean-start-requests.txt
            test -s /tmp/clean-start-requests.txt
          fi
          while IFS= read -r request; do
            case "$request" in
              runtime/clean-start-requests/*.json) ;;
              *) echo "invalid request path: $request" >&2; exit 1 ;;
            esac
            test -f "$request"
          done < /tmp/clean-start-requests.txt

      - name: Run clean-start, bootstrap and staged-access tests
        run: python -m unittest tests.test_clean_start tests.test_bootstrap_request tests.test_staged_access -v

      - name: Materialize requested staged clean starts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/clean-start-results
          while IFS= read -r request; do
            request_name="$(basename "$request" .json)"
            group_run_id="$(python -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["group_run_id"])' "$request")"
            existing="data/group-clean-starts/${group_run_id}/clean-start.json"
            if [[ -f "$existing" ]]; then
              python - "$existing" <<'PY' | tee "/tmp/clean-start-results/${request_name}.json"
          import hashlib
          import json
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          result = json.loads(path.read_text(encoding='utf-8'))
          result['clean_start_path'] = str(path)
          result['clean_start_sha256'] = hashlib.sha256(path.read_bytes()).hexdigest()
          print(json.dumps(result, ensure_ascii=False, sort_keys=True, indent=2))
          PY
            else
              PYTHONPATH=src python scripts/create-staged-group-clean-start.py create-from-request \
                --request "$request" \
                --current-group-manifest CURRENT_GROUP_MANIFEST \
                | tee "/tmp/clean-start-results/${request_name}.json"
            fi
          done < /tmp/clean-start-requests.txt

      - name: Verify generated staged clean starts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          results = sorted(Path('/tmp/clean-start-results').glob('*.json'))
          if not results:
              raise SystemExit('no clean-start results generated')
          for result_path in results:
              result = json.loads(result_path.read_text(encoding='utf-8'))
              if result.get('status') != 'READY_FOR_PREBLIND_MODELING':
                  raise SystemExit(f"unexpected status in {result_path}: {result.get('status')}")
              if result.get('answer_data_available') is not False:
                  raise SystemExit(f'answer data available in {result_path}')
              staged = result.get('retrieval_policy', {}).get('staged_access', {})
              if staged.get('current_stage') != 'PREBLIND':
                  raise SystemExit(f'missing PREBLIND stage in {result_path}')
              if staged.get('withheld_paths_not_disclosed_to_prediction_context') is not True:
                  raise SystemExit(f'withheld path disclosure gate failed in {result_path}')
              clean_path = Path(result['clean_start_path'])
              if not clean_path.is_file():
                  raise SystemExit(f'missing generated clean start: {clean_path}')
              expected = Path('data/group-clean-starts') / result['group_run_id'] / 'clean-start.json'
              if clean_path != expected:
                  raise SystemExit(f'unexpected clean-start path: {clean_path} != {expected}')
          PY

      - name: Commit immutable staged clean-start objects
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/group-clean-starts
          if git diff --cached --quiet; then
            echo 'No new clean-start objects to commit.'
            exit 0
          fi
          git commit -m 'Materialize repository staged clean start'
          git push origin "HEAD:${TARGET_BRANCH}"
