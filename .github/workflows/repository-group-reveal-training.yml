name: repository-group-reveal-training

on:
  push:
    paths:
      - 'runtime/group-reveal-requests/*.json'
  workflow_dispatch:
    inputs:
      request_path:
        description: 'Exact runtime/group-reveal-requests/*.json path'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: repository-group-reveal-training-${{ github.ref }}
  cancel-in-progress: false

jobs:
  reveal-and-start-training:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout public runtime repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime
        run: python -m pip install -e .

      - name: Resolve exact reveal requests
        shell: bash
        env:
          MANUAL_REQUEST_PATH: ${{ inputs.request_path }}
        run: |
          set -euo pipefail
          : > /tmp/group-reveal-requests.txt
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            request="${MANUAL_REQUEST_PATH}"
            case "$request" in
              runtime/group-reveal-requests/*.json) ;;
              *) echo "invalid manual request path: $request" >&2; exit 1 ;;
            esac
            test -f "$request"
            printf '%s\n' "$request" > /tmp/group-reveal-requests.txt
          else
            git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" -- 'runtime/group-reveal-requests/*.json' \
              | sort -u > /tmp/group-reveal-requests.txt
            test -s /tmp/group-reveal-requests.txt
          fi
          while IFS= read -r request; do
            case "$request" in
              runtime/group-reveal-requests/*.json) ;;
              *) echo "invalid request path: $request" >&2; exit 1 ;;
            esac
            test -f "$request"
          done < /tmp/group-reveal-requests.txt

      - name: Verify group freeze and public encrypted answer paths
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          for request_path in Path('/tmp/group-reveal-requests.txt').read_text(encoding='utf-8').splitlines():
              request = json.loads(Path(request_path).read_text(encoding='utf-8'))
              if request.get('schema') != 'GROUP-REVEAL-TRAINING-REQUEST-V1' or request.get('status') != 'REQUESTED':
                  raise SystemExit(f'invalid reveal request: {request_path}')
              group_run_id = request.get('group_run_id')
              run_root = Path('data/group-clean-starts') / group_run_id
              expected_freeze = run_root / 'group-prediction-freeze.json'
              freeze_path = Path(request.get('group_prediction_freeze_path', ''))
              if freeze_path != expected_freeze or not freeze_path.is_file():
                  raise SystemExit(f'group freeze path mismatch: {freeze_path} != {expected_freeze}')
              if Path(request.get('output_root', '')) != run_root / 'training':
                  raise SystemExit(f'training output root mismatch: {request_path}')
              expected_envelope = Path('public-answer-vault/encrypted') / f'{group_run_id}.json.fernet'
              envelope_path = Path(request.get('encrypted_answer_envelope_path', ''))
              if envelope_path != expected_envelope or not envelope_path.is_file():
                  raise SystemExit(f'encrypted answer envelope path mismatch: {envelope_path} != {expected_envelope}')
              envelope = json.loads(envelope_path.read_text(encoding='utf-8'))
              if envelope.get('schema') != 'PUBLIC-ENCRYPTED-ANSWER-VECTOR-V1':
                  raise SystemExit(f'encrypted answer envelope schema invalid: {envelope_path}')
              if envelope.get('status') != 'ENCRYPTED_PUBLIC_STORAGE_READY':
                  raise SystemExit(f'encrypted answer envelope status invalid: {envelope_path}')
              if envelope.get('group_run_id') != group_run_id:
                  raise SystemExit(f'encrypted answer identity mismatch: {envelope_path}')
              if envelope.get('plaintext_not_stored_in_repository') is not True:
                  raise SystemExit(f'plaintext storage policy invalid: {envelope_path}')
              freeze = json.loads(freeze_path.read_text(encoding='utf-8'))
              if freeze.get('status') != 'GROUP_PREDICTION_FREEZE_PASS':
                  raise SystemExit(f'group freeze not PASS: {freeze_path}')
              if freeze.get('all_predictions_frozen_before_reveal') is not True:
                  raise SystemExit(f'group freeze order invalid: {freeze_path}')
              if freeze.get('group_run_id') != group_run_id:
                  raise SystemExit(f'group identity mismatch: {request_path}')
          PY

      - name: Run reveal and public answer vault tests
        run: python -m unittest tests.test_learning_cycle_v2 tests.test_public_answer_vault tests.test_end_to_end_pipeline -v

      - name: Require public encrypted answer key
        shell: bash
        env:
          FORTUNE_PUBLIC_ANSWER_KEY: ${{ secrets.FORTUNE_PUBLIC_ANSWER_KEY }}
        run: |
          set -euo pipefail
          test -n "$FORTUNE_PUBLIC_ANSWER_KEY"

      - name: Decrypt public envelopes only after freeze PASS
        shell: bash
        env:
          FORTUNE_PUBLIC_ANSWER_KEY: ${{ secrets.FORTUNE_PUBLIC_ANSWER_KEY }}
        run: |
          set -euo pipefail
          rm -rf /tmp/fortune-public-answer-vault /tmp/derived-reveal-requests
          mkdir -p /tmp/fortune-public-answer-vault /tmp/derived-reveal-requests /tmp/public-answer-decryption-receipts
          while IFS= read -r request; do
            request_name="$(basename "$request" .json)"
            group_run_id="$(python -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["group_run_id"])' "$request")"
            envelope="$(python -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["encrypted_answer_envelope_path"])' "$request")"
            decrypted="/tmp/fortune-public-answer-vault/${group_run_id}.json"
            PYTHONPATH=src python scripts/public-answer-vault.py decrypt \
              --envelope "$envelope" \
              --output "$decrypted" \
              --repository-root . \
              | tee "/tmp/public-answer-decryption-receipts/${request_name}.json"
            derived="/tmp/derived-reveal-requests/${request_name}.json"
            python - "$request" "$derived" "$group_run_id" <<'PY'
          import json
          import sys
          from pathlib import Path

          source = Path(sys.argv[1])
          target = Path(sys.argv[2])
          group_run_id = sys.argv[3]
          request = json.loads(source.read_text(encoding='utf-8'))
          request['answer_vector_path'] = f'{group_run_id}.json'
          request['answer_vector_transport'] = 'TRANSIENT_DECRYPTED_FROM_PUBLIC_ENVELOPE_AFTER_GROUP_FREEZE'
          target.write_text(json.dumps(request, ensure_ascii=False, sort_keys=True, indent=2) + '\n', encoding='utf-8')
          PY
          done < /tmp/group-reveal-requests.txt

      - name: Literal replay and start learning cycle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/group-reveal-results
          while IFS= read -r request; do
            request_name="$(basename "$request" .json)"
            derived="/tmp/derived-reveal-requests/${request_name}.json"
            PYTHONPATH=src python scripts/group-training-pipeline.py reveal-and-start-training \
              --request "$derived" \
              --answer-root /tmp/fortune-public-answer-vault \
              | tee "/tmp/group-reveal-results/${request_name}.json"
          done < /tmp/group-reveal-requests.txt

      - name: Verify learning intake and public-only transport
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          decryptions = sorted(Path('/tmp/public-answer-decryption-receipts').glob('*.json'))
          results = sorted(Path('/tmp/group-reveal-results').glob('*.json'))
          if not results or len(results) != len(decryptions):
              raise SystemExit('reveal/decryption result count mismatch')
          for receipt_path in decryptions:
              receipt = json.loads(receipt_path.read_text(encoding='utf-8'))
              if receipt.get('status') != 'PASS':
                  raise SystemExit(f'public answer decryption failed: {receipt}')
              if receipt.get('plaintext_committed_to_repository') is not False:
                  raise SystemExit('decrypted answer was marked as repository content')
              if receipt.get('decrypted_output_location') != 'TRANSIENT_OUTSIDE_REPOSITORY':
                  raise SystemExit('decrypted answer location policy failed')
          for path in results:
              result = json.loads(path.read_text(encoding='utf-8'))
              if result.get('status') != 'LEARNING_ACTIVE':
                  raise SystemExit(f'learning cycle did not start: {result}')
              if result.get('training_unit_count', 0) <= 0:
                  raise SystemExit('training unit count invalid')
              intake = Path(result['output_path'])
              if not intake.is_file():
                  raise SystemExit(f'training intake missing: {intake}')
              replay = Path(result['literal_replay_path'])
              replay_body = json.loads(replay.read_text(encoding='utf-8'))
              if replay_body.get('status') != 'PASS':
                  raise SystemExit(f'literal answer replay failed: {replay}')
          PY

      - name: Destroy transient answer plaintext
        if: always()
        run: rm -rf /tmp/fortune-public-answer-vault /tmp/derived-reveal-requests

      - name: Commit immutable reveal and learning intake objects
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/group-clean-starts
          if git diff --cached --quiet; then
            echo 'No reveal or learning intake objects to commit.'
            exit 0
          fi
          git commit -m 'Replay frozen public encrypted answers and start learning cycle'
          git push origin "HEAD:${GITHUB_REF_NAME}"
