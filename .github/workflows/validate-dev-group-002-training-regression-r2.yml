name: validate-dev-group-002-training-regression-r2

on:
  push:
    paths:
      - reports/dev-group-002/training-regression-r2/**
      - knowledge/base/S01_统一输入排盘与坐标冻结库.txt
      - knowledge/base/S03_紫微八字互证与冲突裁决库.txt
      - knowledge/base/S04_十二宫主题太极与气数位库.txt
      - knowledge/base/S10_紫微岁运应期与动态辅助库.txt
      - knowledge/base/S15_八字大运流年流月与应期库.txt
      - knowledge/base/S16_八字专题映射与紫微接口库.txt
      - knowledge/base/S17_专题闭合人物太极与动作终点链库.txt
      - knowledge/base/S18_证据归并非法归零与评分分寸库.txt
      - knowledge/base/S19_运行门禁训练释放反馈审计与校准库.txt
      - .github/workflows/validate-dev-group-002-training-regression-r2.yml
  pull_request:
    paths:
      - reports/dev-group-002/training-regression-r2/**
      - knowledge/base/S01_统一输入排盘与坐标冻结库.txt
      - knowledge/base/S03_紫微八字互证与冲突裁决库.txt
      - knowledge/base/S04_十二宫主题太极与气数位库.txt
      - knowledge/base/S10_紫微岁运应期与动态辅助库.txt
      - knowledge/base/S15_八字大运流年流月与应期库.txt
      - knowledge/base/S16_八字专题映射与紫微接口库.txt
      - knowledge/base/S17_专题闭合人物太极与动作终点链库.txt
      - knowledge/base/S18_证据归并非法归零与评分分寸库.txt
      - knowledge/base/S19_运行门禁训练释放反馈审计与校准库.txt
      - .github/workflows/validate-dev-group-002-training-regression-r2.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-r2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Materialize and validate R2 artifacts
        run: |
          python reports/dev-group-002/training-regression-r2/materialize_validate.py \
            --repo-root . \
            --output reports/dev-group-002/training-regression-r2/materialization-validation.json
      - name: Upload validation object
        uses: actions/upload-artifact@v4
        with:
          name: dev-group-002-training-regression-r2-validation
          path: reports/dev-group-002/training-regression-r2/materialization-validation.json
          if-no-files-found: error
          retention-days: 14
