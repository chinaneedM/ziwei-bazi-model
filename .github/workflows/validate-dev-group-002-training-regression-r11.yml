name: validate-dev-group-002-training-regression-r11

on:
  push:
    paths:
      - reports/dev-group-002/training-regression-r11/**
      - reports/dev-group-002/training-regression-r9/prediction-freeze.json
      - reports/dev-group-002/training-regression-r9/track-option-parent-bindings.json
      - reports/dev-group-002/training-regression-r9/source-excerpts.json
      - reports/dev-group-002/training-regression-r9/postreveal-review.json
      - reports/dev-group-002/training-regression-r10/**
      - .github/workflows/validate-dev-group-002-training-regression-r11.yml
  pull_request:
    paths:
      - reports/dev-group-002/training-regression-r11/**
      - reports/dev-group-002/training-regression-r9/prediction-freeze.json
      - reports/dev-group-002/training-regression-r9/track-option-parent-bindings.json
      - reports/dev-group-002/training-regression-r9/source-excerpts.json
      - reports/dev-group-002/training-regression-r9/postreveal-review.json
      - reports/dev-group-002/training-regression-r10/**
      - .github/workflows/validate-dev-group-002-training-regression-r11.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize-and-validate-r11:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Materialize R11 atom-level pairwise replay
        run: |
          set +e
          python reports/dev-group-002/training-regression-r11/materialize_validate.py \
            --repo-root . --write --validate \
            > reports/dev-group-002/training-regression-r11/execution.log 2>&1
          status=$?
          cat reports/dev-group-002/training-regression-r11/execution.log
          echo "$status" > reports/dev-group-002/training-regression-r11/execution.exit-code
          exit "$status"
      - name: Persist R11 failure diagnostics
        if: failure() && github.event_name == 'push'
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add reports/dev-group-002/training-regression-r11/
          if git diff --cached --quiet; then
            echo 'R11 failure diagnostics already persisted'
          else
            git commit -m 'Record DEV-GROUP-002 R11 execution failure'
            git push origin HEAD:${{ github.ref_name }}
          fi
      - name: Commit deterministic R11 artifacts
        if: success() && github.event_name == 'push'
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm -f \
            reports/dev-group-002/training-regression-r11/execution.log \
            reports/dev-group-002/training-regression-r11/execution.exit-code
          git add reports/dev-group-002/training-regression-r11/
          if git diff --cached --quiet; then
            echo 'R11 artifacts already frozen'
          else
            git commit -m 'Freeze DEV-GROUP-002 R11 atom replay'
            git push origin HEAD:${{ github.ref_name }}
          fi
      - name: Upload R11 validation receipt
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dev-group-002-training-regression-r11-validation
          path: reports/dev-group-002/training-regression-r11/validation.json
          if-no-files-found: error
          retention-days: 14
