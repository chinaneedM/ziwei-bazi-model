name: final-diagnostic
on:
  pull_request:
permissions:
  contents: read
jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e .
      - run: |
          set +e
          python -m unittest discover -s tests -v > final-test-output.txt 2>&1
          echo "exit_code=$?" > final-test-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: final-diagnostic-output
          path: |
            final-test-output.txt
            final-test-status.txt
