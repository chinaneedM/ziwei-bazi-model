name: install-check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compatibility-install-check-v3:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout exact requested revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime and test runner
        run: python -m pip install -e . pytest

      - name: Resolve activation mode
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo 'ACTIVATION_MODE=main' >> "$GITHUB_ENV"
          else
            echo 'ACTIVATION_MODE=candidate' >> "$GITHUB_ENV"
          fi

      - name: Execute V3 make install-check
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/install-check-v3
          make install-check \
            PYTHON=python \
            REPOSITORY_VISIBILITY=public \
            EXPECTED_COMMIT="$GITHUB_SHA" \
            ACTIVATION_MODE="$ACTIVATION_MODE" \
            INSTALL_RECEIPT=/tmp/install-check-v3/install-receipt.json

      - name: Validate V3 receipt
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          receipt = json.loads(Path('/tmp/install-check-v3/install-receipt.json').read_text(encoding='utf-8'))
          expected = (
              'INSTALLED_VALIDATED_READY_FOR_USER_INITIATED_CLEAN_START'
              if os.environ['ACTIVATION_MODE'] == 'main'
              else 'INSTALL_CHECK_PASS_CANDIDATE'
          )
          if receipt.get('schema') != 'FINAL-OPEN-SOURCE-INSTALL-CHECK-RECEIPT-V3':
              raise SystemExit('unexpected install receipt schema')
          if receipt.get('status') != expected or receipt.get('failure_count') != 0:
              raise SystemExit(f'V3 install check failed: {receipt}')
          PY

      - name: Upload V3 receipt without repository mutation
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-install-check-v3-${{ github.sha }}
          path: /tmp/install-check-v3/install-receipt.json
          if-no-files-found: error
          retention-days: 30
