name: repository-group-runtime-packets

on:
  push:
    paths:
      - 'runtime/runtime-packet-requests/*.json'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'runtime/runtime-packet-requests/*.json'
      - 'runtime/runtime-packet-pr-requests/*.json'
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'runtime/runtime-packet-requests/*.json'
      - 'runtime/runtime-packet-pr-requests/*.json'
  workflow_dispatch:
    inputs:
      request_path:
        description: 'Exact runtime packet request JSON path'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: repository-group-runtime-packets-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: false

jobs:
  build-runtime-packets:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout exact request branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime
        run: python -m pip install -e .

      - name: Resolve exact request files
        shell: bash
        env:
          MANUAL_REQUEST_PATH: ${{ inputs.request_path }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          : > /tmp/runtime-packet-requests.txt
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            request="${MANUAL_REQUEST_PATH}"
            case "$request" in
              runtime/runtime-packet-requests/*.json|runtime/runtime-packet-pr-requests/*.json) ;;
              *) echo "invalid manual request path: $request" >&2; exit 1 ;;
            esac
            test -f "$request"
            printf '%s\n' "$request" > /tmp/runtime-packet-requests.txt
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" || "${GITHUB_EVENT_NAME}" == "pull_request_target" ]]; then
            git diff --name-only "${PR_BASE_SHA}...${PR_HEAD_SHA}" -- \
              'runtime/runtime-packet-requests/*.json' \
              'runtime/runtime-packet-pr-requests/*.json' \
              | sort -u > /tmp/runtime-packet-requests.txt
            test -s /tmp/runtime-packet-requests.txt
          else
            git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" -- \
              'runtime/runtime-packet-requests/*.json' \
              | sort -u > /tmp/runtime-packet-requests.txt
            test -s /tmp/runtime-packet-requests.txt
          fi
          while IFS= read -r request; do
            case "$request" in
              runtime/runtime-packet-requests/*.json|runtime/runtime-packet-pr-requests/*.json) ;;
              *) echo "invalid request path: $request" >&2; exit 1 ;;
            esac
            test -f "$request"
          done < /tmp/runtime-packet-requests.txt

      - name: Run staged runtime tests
        run: python -m unittest tests.test_staged_access tests.test_end_to_end_pipeline -v

      - name: Build staged answer-free runtime packets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/runtime-packet-results
          while IFS= read -r request; do
            request_name="$(basename "$request" .json)"
            PYTHONPATH=src python scripts/create-staged-group-runtime-packets.py \
              --request "$request" \
              --max-per-question 8 \
              | tee "/tmp/runtime-packet-results/${request_name}.json"
          done < /tmp/runtime-packet-requests.txt

      - name: Verify PREBLIND runtime gates
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          results = sorted(Path('/tmp/runtime-packet-results').glob('*.json'))
          if not results:
              raise SystemExit('no runtime packet result')
          for path in results:
              result = json.loads(path.read_text(encoding='utf-8'))
              if result.get('status') != 'READY_FOR_PREBLIND_MODELING':
                  raise SystemExit(f'unexpected status: {result}')
              if result.get('answer_data_available') is not False:
                  raise SystemExit('answer data became available')
              if result.get('option_visibility') != 'WITHHELD':
                  raise SystemExit('option visibility is not withheld')
              transport = Path(result['transport_plan_path'])
              body = json.loads(transport.read_text(encoding='utf-8'))
              if body.get('status') != 'READY_FOR_PREBLIND_MODELING':
                  raise SystemExit('transport status is not PREBLIND')
              if body.get('current_stage') != 'PREBLIND':
                  raise SystemExit('transport stage is not PREBLIND')
              if body.get('answer_data_available') is not False:
                  raise SystemExit('transport answer isolation failed')
              if body.get('postblind_release_receipt_required') is not True:
                  raise SystemExit('postblind release receipt is not required')
              if not body.get('withheld_path_hashes'):
                  raise SystemExit('withheld path hashes missing')
              for generated in body.get('generated_paths', []):
                  if not Path(generated).is_file():
                      raise SystemExit(f'missing generated path: {generated}')
              for row in body.get('withheld_path_hashes', []):
                  if row.get('role') != 'POSTBLIND_ONLY':
                      raise SystemExit('invalid withheld path role')
          PY

      - name: Commit immutable staged runtime packets
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/group-clean-starts
          if git diff --cached --quiet; then
            echo 'No staged runtime packet objects to commit.'
            exit 0
          fi
          git commit -m 'Materialize staged group runtime packets'
          git push origin "HEAD:${TARGET_BRANCH}"
