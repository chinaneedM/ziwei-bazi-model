name: validate-dev-example-001-training-regression-r3

on:
  push:
    paths:
      - reports/dev-group-002/training-regression-r3/DEV-EXAMPLE-001/**
      - training-data/DEV-GROUP-002/cases/DEV-EXAMPLE-001.json
      - training-data/DEV-GROUP-002/readable/DEV-EXAMPLE-001/**
      - knowledge/base/S06_六十星系与十二基础盘库.txt
      - knowledge/base/S07_全星曜与星系入十二宫库.txt
      - knowledge/base/S16_八字专题映射与紫微接口库.txt
      - .github/workflows/validate-dev-example-001-training-regression-r3.yml
  pull_request:
    paths:
      - reports/dev-group-002/training-regression-r3/DEV-EXAMPLE-001/**
      - training-data/DEV-GROUP-002/cases/DEV-EXAMPLE-001.json
      - training-data/DEV-GROUP-002/readable/DEV-EXAMPLE-001/**
      - knowledge/base/S06_六十星系与十二基础盘库.txt
      - knowledge/base/S07_全星曜与星系入十二宫库.txt
      - knowledge/base/S16_八字专题映射与紫微接口库.txt
      - .github/workflows/validate-dev-example-001-training-regression-r3.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-dev-example-001-r3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate source-grounded replay
        run: |
          python reports/dev-group-002/training-regression-r3/DEV-EXAMPLE-001/validate.py \
            --repo-root . \
            --output reports/dev-group-002/training-regression-r3/DEV-EXAMPLE-001/validation.json
      - name: Upload validation object
        uses: actions/upload-artifact@v4
        with:
          name: dev-example-001-training-regression-r3-validation
          path: reports/dev-group-002/training-regression-r3/DEV-EXAMPLE-001/validation.json
          if-no-files-found: error
          retention-days: 14
