name: grade-frozen-prediction
on:
  workflow_dispatch:
    inputs:
      run_id:
        required: true
        type: string
      answer_object_path:
        required: true
        type: string
permissions:
  contents: write
jobs:
  grade:
    environment: answer-vault-grading
    runs-on: ubuntu-latest
    steps:
      - name: Checkout runtime
        uses: actions/checkout@v4
        with:
          path: runtime
      - name: Require frozen receipt before vault access
        run: test -f "runtime/data/runs/${{ inputs.run_id }}/freeze-receipt.json"
      - name: Checkout answer vault with grader-only credential
        uses: actions/checkout@v4
        with:
          repository: chinaneedM/fortune-answer-vault
          token: ${{ secrets.ANSWER_VAULT_TOKEN }}
          path: answer-vault
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e runtime
      - name: Grade immutable prediction
        working-directory: runtime
        run: >-
          fortune-v1 grade
          --freeze-receipt "data/runs/${{ inputs.run_id }}/freeze-receipt.json"
          --answer "../answer-vault/${{ inputs.answer_object_path }}"
          --output "data/reveals/${{ inputs.run_id }}.json"
      - name: Remove answer vault before writing runtime artifact
        run: rm -rf answer-vault
      - name: Commit reveal without overwriting prediction
        working-directory: runtime
        run: |
          git config user.name fortune-grader
          git config user.email fortune-grader@users.noreply.github.com
          git add "data/reveals/${{ inputs.run_id }}.json"
          git commit -m "grade: ${{ inputs.run_id }}"
          git push

