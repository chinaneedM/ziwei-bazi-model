name: validate-clean-start

on:
  pull_request:
    paths:
      - "src/fortune_v1/clean_start.py"
      - "scripts/create-group-clean-start.py"
      - "tests/test_clean_start.py"
      - "docs/group-clean-start.md"
      - "reports/group-clean-start-interface.json"
      - ".github/workflows/validate-clean-start.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .
      - name: Run clean start tests
        run: python -m unittest tests.test_clean_start -v
      - name: Verify direct command help
        run: PYTHONPATH=src python scripts/create-group-clean-start.py --help
