name: validator-diagnostic
on:
  pull_request:
permissions:
  contents: read
jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e .
      - name: Capture test output
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > test-output.txt 2>&1
          echo "exit_code=$?" > test-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: validator-diagnostic-output
          path: |
            test-output.txt
            test-status.txt
