name: validate-dev-group-002-training-regression-r14

on:
  push:
    paths:
      - reports/dev-group-002/training-regression-r14/**
      - reports/dev-group-002/training-regression-r13/**
      - reports/dev-group-002/training-regression-r12/literal-atom-direction-matrix.json
      - reports/dev-group-002/training-regression-r12/common-atom-subtraction.json
      - reports/dev-group-002/training-regression-r12/prediction-freeze.json
      - reports/dev-group-002/training-regression-r12/postreveal-review.json
      - .github/workflows/validate-dev-group-002-training-regression-r14.yml
  pull_request:
    paths:
      - reports/dev-group-002/training-regression-r14/**
      - reports/dev-group-002/training-regression-r13/**
      - reports/dev-group-002/training-regression-r12/literal-atom-direction-matrix.json
      - reports/dev-group-002/training-regression-r12/common-atom-subtraction.json
      - reports/dev-group-002/training-regression-r12/prediction-freeze.json
      - reports/dev-group-002/training-regression-r12/postreveal-review.json
      - .github/workflows/validate-dev-group-002-training-regression-r14.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize-and-validate-r14:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Materialize R14 clean replay
        run: |
          set +e
          python reports/dev-group-002/training-regression-r14/materialize_validate_v2.py \
            --repo-root . --write --validate \
            > reports/dev-group-002/training-regression-r14/execution.log 2>&1
          status=$?
          cat reports/dev-group-002/training-regression-r14/execution.log
          echo "$status" > reports/dev-group-002/training-regression-r14/execution.exit-code
          exit "$status"
      - name: Persist R14 failure diagnostics
        if: failure() && github.event_name == 'push'
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add reports/dev-group-002/training-regression-r14/
          if git diff --cached --quiet; then
            echo 'R14 failure diagnostics already persisted'
          else
            git commit -m 'Record DEV-GROUP-002 R14 execution failure'
            git push origin HEAD:${{ github.ref_name }}
          fi
      - name: Commit deterministic R14 artifacts
        if: success() && github.event_name == 'push'
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm -f \
            reports/dev-group-002/training-regression-r14/execution.log \
            reports/dev-group-002/training-regression-r14/execution.exit-code
          git add reports/dev-group-002/training-regression-r14/
          if git diff --cached --quiet; then
            echo 'R14 artifacts already frozen'
          else
            git commit -m 'Freeze DEV-GROUP-002 R14 clean replay'
            git push origin HEAD:${{ github.ref_name }}
          fi
      - name: Upload R14 validation receipt
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dev-group-002-training-regression-r14-validation
          path: reports/dev-group-002/training-regression-r14/validation.json
          if-no-files-found: error
          retention-days: 14
