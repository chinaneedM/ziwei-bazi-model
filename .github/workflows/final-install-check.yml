name: final-install-check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  make-install-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout exact workflow revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime and test runner
        run: python -m pip install -e . pytest

      - name: Resolve activation mode
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" == "main" && "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            echo 'ACTIVATION_MODE=main' >> "$GITHUB_ENV"
          else
            echo 'ACTIVATION_MODE=candidate' >> "$GITHUB_ENV"
          fi

      - name: Execute complete make install-check
        shell: bash
        run: |
          set -u
          mkdir -p /tmp/final-install-check
          set +e
          make install-check \
            PYTHON=python \
            REPOSITORY_VISIBILITY=public \
            EXPECTED_COMMIT="$GITHUB_SHA" \
            ACTIVATION_MODE="$ACTIVATION_MODE" \
            INSTALL_RECEIPT=/tmp/final-install-check/install-receipt.json \
            ACTIVATED_STATE_RECEIPT=/tmp/final-install-check/activated-state-receipt.json \
            > /tmp/final-install-check/make-install-check.log 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > /tmp/final-install-check/exit-code.txt
          echo "MAKE_INSTALL_CHECK_EXIT_CODE=$status" >> "$GITHUB_ENV"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path('/tmp/final-install-check')
          diagnostic = {
              'schema': 'FINAL-INSTALL-CHECK-DIAGNOSTIC-V1',
              'make_exit_code': int((root / 'exit-code.txt').read_text().strip()),
              'install_receipt_exists': (root / 'install-receipt.json').is_file(),
              'activated_state_receipt_exists': (root / 'activated-state-receipt.json').is_file(),
              'activation_mode': os.environ['ACTIVATION_MODE'],
              'github_sha': os.environ['GITHUB_SHA'],
          }
          (root / 'diagnostic.json').write_text(
              json.dumps(diagnostic, sort_keys=True, indent=2) + '\n',
              encoding='utf-8',
          )
          PY
          exit 0

      - name: Upload immutable install-check diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-install-check-${{ github.sha }}
          path: /tmp/final-install-check/
          if-no-files-found: error
          retention-days: 30

      - name: Validate receipts and safety boundaries
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path('/tmp/final-install-check')
          install_path = root / 'install-receipt.json'
          state_path = root / 'activated-state-receipt.json'
          if not install_path.is_file() or not state_path.is_file():
              log = (root / 'make-install-check.log').read_text(encoding='utf-8', errors='replace')
              raise SystemExit('required receipt was not produced:\n' + log[-12000:])
          install = json.loads(install_path.read_text(encoding='utf-8'))
          state = json.loads(state_path.read_text(encoding='utf-8'))
          mode = os.environ['ACTIVATION_MODE']
          expected = (
              'INSTALLED_VALIDATED_READY_FOR_USER_INITIATED_CLEAN_START'
              if mode == 'main'
              else 'INSTALL_CHECK_PASS_CANDIDATE'
          )
          if os.environ.get('MAKE_INSTALL_CHECK_EXIT_CODE') != '0':
              raise SystemExit(f'make install-check failed: install={install}, state={state}')
          if install.get('status') != expected or install.get('failure_count') != 0:
              raise SystemExit(f'unexpected install receipt: {install}')
          if install.get('pass_count') != install.get('check_count'):
              raise SystemExit('not all install checks passed')
          if state.get('schema') != 'ACTIVATED-INSTALLATION-STATE-VERIFICATION-V1':
              raise SystemExit('activated state receipt schema invalid')
          if state.get('status') != 'PASS' or state.get('failure_count') != 0:
              raise SystemExit(f'activated state verification failed: {state}')
          if state.get('pass_count') != state.get('check_count'):
              raise SystemExit('not all activated state checks passed')
          for receipt in (install, state):
              if receipt.get('background_execution') is not False:
                  raise SystemExit('background execution boundary invalid')
              if receipt.get('score_eligibility') != 'CONDITIONAL_PER_RUN_CAUSAL_USE_RECEIPT_PASS':
                  raise SystemExit('score eligibility boundary invalid')
          if install.get('synthetic_run_scoring_eligibility') != 'NONE':
              raise SystemExit('synthetic run scoring boundary invalid')
          PY
