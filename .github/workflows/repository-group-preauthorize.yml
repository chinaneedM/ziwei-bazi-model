name: repository-group-preauthorize

on:
  push:
    paths:
      - 'runtime/preauthorization-intents/*.json'
  workflow_dispatch:
    inputs:
      intent_path:
        description: 'Exact runtime/preauthorization-intents/*.json path'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: repository-group-preauthorize-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preauthorize-and-materialize:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout exact public runtime revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime and test runner
        run: python -m pip install -e . pytest

      - name: Resolve exact intent files
        shell: bash
        env:
          MANUAL_INTENT_PATH: ${{ inputs.intent_path }}
        run: |
          set -euo pipefail
          : > /tmp/group-preauthorization-intents.txt
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            intent="${MANUAL_INTENT_PATH}"
            case "$intent" in
              runtime/preauthorization-intents/*.json) ;;
              *) echo "invalid manual intent path: $intent" >&2; exit 1 ;;
            esac
            test -f "$intent"
            printf '%s\n' "$intent" > /tmp/group-preauthorization-intents.txt
          else
            git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" -- 'runtime/preauthorization-intents/*.json' \
              | sort -u > /tmp/group-preauthorization-intents.txt
            test -s /tmp/group-preauthorization-intents.txt
          fi
          while IFS= read -r intent; do
            case "$intent" in
              runtime/preauthorization-intents/*.json) ;;
              *) echo "invalid intent path: $intent" >&2; exit 1 ;;
            esac
            test -f "$intent"
          done < /tmp/group-preauthorization-intents.txt

      - name: Run deterministic bootstrap and staged-access tests
        run: |
          python -m unittest \
            tests.test_bootstrap_request \
            tests.test_clean_start \
            tests.test_staged_access \
            tests.test_end_to_end_pipeline -v

      - name: Verify installed state and active answer-free group pointer
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          state = json.loads(Path('reports/install-state.json').read_text(encoding='utf-8'))
          required_state = {
              'status': 'INSTALLED_VALIDATED',
              'automation_runtime_install_status': 'INSTALLED_VALIDATED_READY_FOR_USER_INITIATED_CLEAN_START',
              'formal_training_permission': 'READY_FOR_USER_INITIATED_CLEAN_START_ONLY',
              'next_allowed_action': 'USER_INITIATED_CLEAN_START',
              'background_execution': False,
          }
          for key, value in required_state.items():
              if state.get(key) != value:
                  raise SystemExit(f'install state mismatch: {key}={state.get(key)!r}, expected {value!r}')

          pointer = json.loads(Path('CURRENT_GROUP_MANIFEST').read_text(encoding='utf-8'))
          if pointer.get('schema') != 'CURRENT-GROUP-MANIFEST-POINTER-V1' or pointer.get('status') != 'ACTIVE':
              raise SystemExit('current group pointer invalid')
          if pointer.get('answer_payload_present') is not False:
              raise SystemExit('answer payload present in group pointer')
          if pointer.get('runtime_answer_scan') != 'PASS':
              raise SystemExit('group pointer answer scan failed')
          if pointer.get('answer_vault_location_outside_reasoning_context') is not True:
              raise SystemExit('answer isolation boundary invalid')
          PY

      - name: Materialize V2 requests and staged clean starts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/group-preauthorization-results /tmp/group-clean-start-validations
          while IFS= read -r intent_path; do
            python - "$intent_path" <<'PY' > /tmp/group-preauthorization.env
          import json
          import shlex
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          intent = json.loads(path.read_text(encoding='utf-8'))
          if intent.get('schema') != 'GROUP-CLEAN-START-PREAUTHORIZATION-INTENT-V1':
              raise SystemExit(f'invalid intent schema: {path}')
          if intent.get('status') != 'REQUESTED':
              raise SystemExit(f'invalid intent status: {path}')
          if intent.get('requested_group_id') != 'DEV-GROUP-002':
              raise SystemExit(f'unexpected group id: {path}')
          mode = intent.get('mode')
          if mode not in {'CHAT_ONLY', 'WORK'}:
              raise SystemExit(f'invalid mode: {path}')
          forbidden = {
              'case_content', 'cases', 'questions', 'options', 'predictions',
              'answers', 'answer_vector', 'reveal', 'prior_run', 'old_run',
              'pointer_sha256', 'allowed_repository', 'forbidden_repository',
          }
          contamination = sorted(forbidden.intersection(intent))
          if contamination:
              raise SystemExit(f'control intent contains forbidden fields {contamination}: {path}')
          for key in ('group_run_id', 'session_id'):
              value = intent.get(key)
              if not isinstance(value, str) or not value:
                  raise SystemExit(f'missing {key}: {path}')
          values = {
              'INTENT_PATH': path.as_posix(),
              'GROUP_RUN_ID': intent['group_run_id'],
              'SESSION_ID': intent['session_id'],
              'MODE': mode,
          }
          for key, value in values.items():
              print(f'{key}={shlex.quote(value)}')
          PY
            source /tmp/group-preauthorization.env
            request="runtime/clean-start-requests/${GROUP_RUN_ID}.json"
            clean="data/group-clean-starts/${GROUP_RUN_ID}/clean-start.json"
            receipt="reports/clean-start-preauthorization/${GROUP_RUN_ID}.json"
            test ! -e "$request"
            test ! -e "data/group-clean-starts/${GROUP_RUN_ID}"
            test ! -e "$receipt"

            PYTHONPATH=src python scripts/create-staged-group-clean-start.py prepare-request \
              --current-group-manifest CURRENT_GROUP_MANIFEST \
              --output "$request" \
              --group-run-id "$GROUP_RUN_ID" \
              --session-id "$SESSION_ID" \
              --mode "$MODE" \
              > "/tmp/group-preauthorization-results/${GROUP_RUN_ID}-request.json"

            PYTHONPATH=src python scripts/create-staged-group-clean-start.py create-from-request \
              --request "$request" \
              --current-group-manifest CURRENT_GROUP_MANIFEST \
              > "/tmp/group-preauthorization-results/${GROUP_RUN_ID}-clean-start.json"

            test -f "$clean"
            PYTHONPATH=src python scripts/group-training-pipeline.py validate-clean-start \
              --clean-start "$clean" \
              --output "/tmp/group-clean-start-validations/${GROUP_RUN_ID}.json"

            python - "$INTENT_PATH" "$request" "$clean" "$receipt" <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          intent_path, request_path, clean_path, receipt_path = map(Path, sys.argv[1:])
          intent = json.loads(intent_path.read_text(encoding='utf-8'))
          request = json.loads(request_path.read_text(encoding='utf-8'))
          clean = json.loads(clean_path.read_text(encoding='utf-8'))
          validation_path = Path('/tmp/group-clean-start-validations') / f"{intent['group_run_id']}.json"
          validation = json.loads(validation_path.read_text(encoding='utf-8'))

          if request.get('schema') != 'GROUP-CLEAN-START-REQUEST-V2':
              raise SystemExit('generated request schema invalid')
          if request.get('request_origin') != 'PREAUTHORIZED_ENGINEERING_BOOTSTRAP':
              raise SystemExit('generated request origin invalid')
          for key in (
              'prediction_context_started',
              'prediction_context_repository_search_used',
              'prediction_context_commit_history_used',
              'prediction_context_old_run_objects_visible',
          ):
              if request.get(key) is not False:
                  raise SystemExit(f'generated request precontent flag invalid: {key}')
          expected_entrypoint = f"data/group-clean-starts/{intent['group_run_id']}/clean-start.json"
          if request.get('future_prediction_entrypoint') != expected_entrypoint:
              raise SystemExit('future prediction entrypoint mismatch')
          if request.get('future_prediction_first_repository_action') != 'FETCH_EXACT_CLEAN_START_PATH_ONLY':
              raise SystemExit('future prediction first action invalid')

          if clean.get('status') != 'READY_FOR_PREBLIND_MODELING':
              raise SystemExit(f"clean-start status invalid: {clean.get('status')}")
          if clean.get('group_run_id') != intent.get('group_run_id'):
              raise SystemExit('clean-start group run id mismatch')
          if clean.get('answer_data_available') is not False:
              raise SystemExit('answer data available in clean start')
          cases = clean.get('cases', [])
          if len(cases) != 5:
              raise SystemExit('clean-start case count mismatch')
          if [row.get('case_id') for row in cases] != [f'DEV-EXAMPLE-{index:03d}' for index in range(1, 6)]:
              raise SystemExit('clean-start case order mismatch')
          if validation.get('status') != 'PASS':
              raise SystemExit(f'clean-start validator failed: {validation}')

          def digest(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          receipt = {
              'schema': 'GROUP-CLEAN-START-PREAUTHORIZATION-RECEIPT-V1',
              'status': 'PASS',
              'requested_group_id': intent['requested_group_id'],
              'group_run_id': intent['group_run_id'],
              'session_id': intent['session_id'],
              'mode': intent['mode'],
              'intent_path': intent_path.as_posix(),
              'intent_sha256': digest(intent_path),
              'request_path': request_path.as_posix(),
              'request_sha256': digest(request_path),
              'clean_start_path': clean_path.as_posix(),
              'clean_start_sha256': digest(clean_path),
              'case_count': 5,
              'question_count_total': 25,
              'answer_data_available': False,
              'prediction_context_started': False,
              'future_prediction_first_repository_action': 'FETCH_EXACT_CLEAN_START_PATH_ONLY',
              'formal_prediction_status': 'NOT_STARTED_REQUIRES_FRESH_PREDICTION_CONTEXT',
              'score_eligibility': 'NONE_BEFORE_PREDICTION_FREEZE_AND_CAUSAL_USE_RECEIPT',
          }
          encoded = json.dumps(receipt, ensure_ascii=False, sort_keys=True, separators=(',', ':')).encode('utf-8')
          receipt['object_hash'] = hashlib.sha256(encoded).hexdigest()
          receipt_path.parent.mkdir(parents=True, exist_ok=True)
          receipt_path.write_text(json.dumps(receipt, ensure_ascii=False, sort_keys=True, indent=2) + '\n', encoding='utf-8')
          PY
          done < /tmp/group-preauthorization-intents.txt

      - name: Commit immutable generated startup objects
        shell: bash
        run: |
          set -euo pipefail
          git add runtime/preauthorization-intents runtime/clean-start-requests data/group-clean-starts reports/clean-start-preauthorization
          test -n "$(git diff --cached --name-only)"
          while IFS= read -r path; do
            case "$path" in
              runtime/preauthorization-intents/*.json) ;;
              runtime/clean-start-requests/*.json) ;;
              data/group-clean-starts/*/*) ;;
              reports/clean-start-preauthorization/*.json) ;;
              *) echo "forbidden preauthorization write: $path" >&2; exit 1 ;;
            esac
          done <<< "$(git diff --cached --name-only)"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'Materialize repository group preauthorization'
          git push origin "HEAD:${GITHUB_REF_NAME}"
