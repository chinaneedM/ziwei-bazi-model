name: validate-dev-group-002-training-regression-r8

on:
  push:
    paths:
      - reports/dev-group-002/training-regression-r8/**
      - data/chat-work-candidates/DEV-EXAMPLE-002.prediction-body-draft.json
      - data/chat-work-candidates/DEV-EXAMPLE-002.pairwise-replay-overlay.json
      - data/prediction-contracts/DEV-EXAMPLE-002.json
      - reports/dev-group-002/training-regression-r3/DEV-EXAMPLE-002/receipt.json
      - reports/dev-group-002/training-regression-r7/**
      - .github/workflows/validate-dev-group-002-training-regression-r8.yml
  pull_request:
    paths:
      - reports/dev-group-002/training-regression-r8/**
      - data/chat-work-candidates/DEV-EXAMPLE-002.prediction-body-draft.json
      - data/chat-work-candidates/DEV-EXAMPLE-002.pairwise-replay-overlay.json
      - data/prediction-contracts/DEV-EXAMPLE-002.json
      - reports/dev-group-002/training-regression-r3/DEV-EXAMPLE-002/receipt.json
      - reports/dev-group-002/training-regression-r7/**
      - .github/workflows/validate-dev-group-002-training-regression-r8.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize-and-validate-r8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Materialize R8 historical recovery audit
        run: |
          python reports/dev-group-002/training-regression-r8/materialize_validate.py \
            --repo-root . --write --validate
      - name: Commit deterministic R8 artifacts
        if: github.event_name == 'push'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add reports/dev-group-002/training-regression-r8/
          if git diff --cached --quiet; then
            echo 'R8 artifacts already frozen'
          else
            git commit -m 'Freeze DEV-GROUP-002 R8 recovery audit'
            git push origin HEAD:${{ github.ref_name }}
          fi
      - name: Upload R8 validation receipt
        uses: actions/upload-artifact@v4
        with:
          name: dev-group-002-training-regression-r8-validation
          path: reports/dev-group-002/training-regression-r8/validation.json
          if-no-files-found: error
          retention-days: 14
