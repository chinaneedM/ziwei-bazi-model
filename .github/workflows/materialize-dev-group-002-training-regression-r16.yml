name: materialize-dev-group-002-training-regression-r16

on:
  pull_request:
    branches:
      - main
    types:
      - ready_for_review
      - synchronize
    paths:
      - 'reports/dev-group-002/training-regression-r16/payload-b85/**'
      - '.github/workflows/materialize-dev-group-002-training-regression-r16.yml'
  push:
    branches:
      - agent/dev-group-002-training-regression-r1
    paths:
      - 'reports/dev-group-002/training-regression-r16/payload-b85/**'
      - '.github/workflows/materialize-dev-group-002-training-regression-r16.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dev-group-002-training-regression-r1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Decode deterministic R16 materializer
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib
          import runpy
          import zlib

          payload_dir = Path('reports/dev-group-002/training-regression-r16/payload-b85')
          parts = sorted(payload_dir.glob('part*'))
          if not parts:
              raise SystemExit('R16 Base85 payload parts are missing')
          pieces = []
          for part in parts:
              if part.suffix == '.py':
                  pieces.append(runpy.run_path(str(part))['PART'])
              else:
                  pieces.append(''.join(part.read_text(encoding='utf-8-sig').split()))
          encoded = ''.join(pieces)
          if len(encoded) != 19423:
              raise SystemExit(f'R16 encoded length mismatch: {len(encoded)}')
          compressed = base64.b85decode(encoded)
          compressed_sha = hashlib.sha256(compressed).hexdigest()
          if compressed_sha != '99981e4efe4f9a4f09dc12be732e8cc3c939538c576725869451880195a14844':
              raise SystemExit(f'R16 compressed SHA mismatch: {compressed_sha}')
          script = zlib.decompress(compressed)
          script_sha = hashlib.sha256(script).hexdigest()
          if script_sha != '49538f865e1153c41c071f50aa18201e095e89bcf7820414488e57b189e11894':
              raise SystemExit(f'R16 script SHA mismatch: {script_sha}')
          target = Path('reports/dev-group-002/training-regression-r16/materialize_validate.py')
          target.write_bytes(script)
          print(f'payload_parts={len(parts)} encoded_chars={len(encoded)} compressed_bytes={len(compressed)} decoded_bytes={len(script)}')
          print(f'compressed_sha256={compressed_sha} script_sha256={script_sha}')
          PY
      - name: Materialize and validate R16
        run: |
          python reports/dev-group-002/training-regression-r16/materialize_validate.py --repo-root . --write --validate
      - name: Commit deterministic R16 objects
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/dev-group-002/training-regression-r16
          if git diff --cached --quiet; then
            echo 'R16 objects already materialized'
          else
            git commit -m 'Materialize DEV-GROUP-002 R16 frozen-interface replay [skip ci]'
            git push origin HEAD:agent/dev-group-002-training-regression-r1
          fi
