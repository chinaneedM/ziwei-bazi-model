name: materialize-dev-group-002-training-regression-r16

on:
  pull_request:
    branches:
      - main
    types:
      - ready_for_review
      - synchronize
    paths:
      - 'reports/dev-group-002/training-regression-r16/payload/**'
      - '.github/workflows/materialize-dev-group-002-training-regression-r16.yml'
  push:
    branches:
      - agent/dev-group-002-training-regression-r1
    paths:
      - 'reports/dev-group-002/training-regression-r16/payload/**'
      - '.github/workflows/materialize-dev-group-002-training-regression-r16.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dev-group-002-training-regression-r1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Decode deterministic R16 materializer
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib
          import zlib

          payload_dir = Path('reports/dev-group-002/training-regression-r16/payload')
          parts = sorted(payload_dir.glob('part*.txt'))
          if not parts:
              raise SystemExit('R16 payload parts are missing')
          encoded = ''.join(part.read_text(encoding='utf-8-sig') for part in parts)
          encoded = ''.join(encoded.split())
          print(f'payload_parts={len(parts)} encoded_chars={len(encoded)} prefix={encoded[:12]!r} suffix={encoded[-12:]!r}')
          padding = '=' * (-len(encoded) % 4)
          compressed = base64.b64decode(encoded + padding, validate=True)
          print(f'compressed_bytes={len(compressed)} compressed_sha256={hashlib.sha256(compressed).hexdigest()} magic={compressed[:8].hex()}')
          script = zlib.decompress(compressed)
          target = Path('reports/dev-group-002/training-regression-r16/materialize_validate.py')
          target.write_bytes(script)
          print(f'decoded_bytes={len(script)} script_sha256={hashlib.sha256(script).hexdigest()}')
          PY
      - name: Materialize and validate R16
        run: |
          python reports/dev-group-002/training-regression-r16/materialize_validate.py --repo-root . --write --validate
      - name: Commit deterministic R16 objects
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/dev-group-002/training-regression-r16
          if git diff --cached --quiet; then
            echo 'R16 objects already materialized'
          else
            git commit -m 'Materialize DEV-GROUP-002 R16 frozen-interface replay [skip ci]'
            git push origin HEAD:agent/dev-group-002-training-regression-r1
          fi
