name: one-time-diagnose-group-signal

on:
  push:
    paths:
      - '.github/workflows/one-time-diagnose-group-signal.yml'

permissions:
  actions: read
  contents: write

jobs:
  diagnose-and-remove-self:
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_BRANCH: runtime/start-dev-group-002-0052b111b31d
      TARGET_COMMIT: 2d926ad2ed4cacb73a4984045638f30847e33799
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Read workflow run and job status
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/runtime-diagnostics
          gh api "repos/$GITHUB_REPOSITORY/actions/workflows/repository-group-start-signal.yml/runs?branch=$TARGET_BRANCH&event=push&per_page=50" > /tmp/runs.json
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          payload = json.loads(Path('/tmp/runs.json').read_text(encoding='utf-8'))
          target = os.environ['TARGET_COMMIT']
          runs = [row for row in payload.get('workflow_runs', []) if row.get('head_sha') == target]
          result = {
              'schema': 'GROUP-SIGNAL-WORKFLOW-DIAGNOSTIC-V1',
              'target_branch': os.environ['TARGET_BRANCH'],
              'target_commit': target,
              'run_count': len(runs),
              'runs': [],
          }
          for run in runs:
              proc = subprocess.run(
                  ['gh', 'api', f"repos/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{run['id']}/jobs?per_page=100"],
                  capture_output=True,
                  text=True,
                  check=True,
              )
              jobs = json.loads(proc.stdout).get('jobs', [])
              result['runs'].append({
                  'id': run.get('id'),
                  'status': run.get('status'),
                  'conclusion': run.get('conclusion'),
                  'run_number': run.get('run_number'),
                  'event': run.get('event'),
                  'jobs': [
                      {
                          'id': job.get('id'),
                          'name': job.get('name'),
                          'status': job.get('status'),
                          'conclusion': job.get('conclusion'),
                          'steps': [
                              {
                                  'name': step.get('name'),
                                  'status': step.get('status'),
                                  'conclusion': step.get('conclusion'),
                                  'number': step.get('number'),
                              }
                              for step in job.get('steps', [])
                          ],
                      }
                      for job in jobs
                  ],
              })
          result['status'] = 'FOUND' if runs else 'NOT_FOUND'
          Path('reports/runtime-diagnostics/group-signal-run.json').write_text(
              json.dumps(result, ensure_ascii=False, sort_keys=True, indent=2) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Remove workflow and commit report
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/one-time-diagnose-group-signal.yml
          git add reports/runtime-diagnostics/group-signal-run.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'Record group signal workflow diagnostic'
          git push origin "HEAD:${GITHUB_REF_NAME}"
