name: group-training-validation

on:
  pull_request:
    paths:
      - "src/fortune_v1/**"
      - "tests/**"
      - "config/group-training-runtime.json"
      - "docs/group-training-*.md"
      - "docs/external-runner.md"
      - "README.md"
      - ".github/workflows/group-training-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Compile runtime
        run: python -m compileall -q src

      - name: Verify group commands are registered
        run: |
          fortune-v1 group-chat-work-run --help
          fortune-v1 group-verify-freeze --help

      - name: Run group fail-closed tests
        run: pytest -q tests/test_group_runner.py

      - name: Run complete test suite
        run: pytest -q
