name: one-time-inspect-group-validation

on:
  push:
    paths:
      - '.github/workflows/one-time-inspect-group-validation.yml'

permissions:
  contents: write

jobs:
  inspect-and-remove-self:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout candidate branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Record exact group validation workflow
        shell: bash
        run: |
          set -euo pipefail
          target="$(grep -R -l '^name: group-training-validation$' .github/workflows | head -n 1)"
          test -n "$target"
          mkdir -p reports/open-source-migration
          {
            echo '# Group training validation workflow inspection'
            echo
            echo "Path: $target"
            echo
            echo '```yaml'
            cat "$target"
            echo '```'
          } > reports/open-source-migration/group-training-validation-workflow-inspection.md

      - name: Remove one-time workflow and commit inspection
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/one-time-inspect-group-validation.yml
          git add reports/open-source-migration/group-training-validation-workflow-inspection.md
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'Record group validation workflow inspection'
          git push origin "HEAD:${GITHUB_REF_NAME}"
