name: train-dev-group

on:
  workflow_dispatch:
    inputs:
      group_id:
        required: true
        default: DEV-GROUP-002
        type: string
      run_id:
        required: true
        default: DEV-GROUP-002-BASELINE-RUN-001
        type: string

permissions:
  contents: write

jobs:
  prepare-private-grading-request:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate frozen baseline and build request
        shell: bash
        run: |
          set -euo pipefail
          group='${{ inputs.group_id }}'
          run='${{ inputs.run_id }}'
          receipt="data/relative-baseline-runs/$run/freeze-receipt.json"
          test -f "$receipt"
          python scripts/train-dev-group-orchestrator.py request \
            --group-id "$group" \
            --run-id "$run" \
            --freeze-receipt "$receipt" \
            --output "data/grading-requests/$run.json"
      - name: Persist grading request
        shell: bash
        run: |
          set -euo pipefail
          run='${{ inputs.run_id }}'
          git config user.name fortune-train-orchestrator
          git config user.email fortune-train-orchestrator@users.noreply.github.com
          git add -f "data/grading-requests/$run.json"
          if git diff --cached --quiet; then
            echo 'Request already materialized'
          else
            git commit -m "Request private grading for $run [skip ci]"
            git push origin HEAD:main
          fi
      - name: Record reverse-grading handoff state
        shell: bash
        run: |
          set -euo pipefail
          group='${{ inputs.group_id }}'
          run='${{ inputs.run_id }}'
          mkdir -p reports
          cat > "reports/${run}-reverse-grading-handoff.json" <<JSON
          {
            "schema": "REVERSE-GRADING-HANDOFF-V1",
            "status": "AWAITING_VAULT_INITIATED_GRADING",
            "group_id": "$group",
            "run_id": "$run",
            "request_path": "data/grading-requests/$run.json",
            "runtime_repository_vault_credential": "NONE",
            "runtime_dispatch_to_vault": false,
            "grading_direction": "ANSWER_VAULT_INITIATED_REVERSE_GRADING",
            "manual_stage_confirmations_required_after_install": false
          }
          JSON
          git config user.name fortune-train-orchestrator
          git config user.email fortune-train-orchestrator@users.noreply.github.com
          git add "reports/${run}-reverse-grading-handoff.json"
          git diff --cached --quiet || {
            git commit -m "Record reverse grading handoff for $run [skip ci]"
            git push origin HEAD:main
          }
