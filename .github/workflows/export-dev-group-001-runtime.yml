name: Export DEV-GROUP-001 runtime files

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/export-dev-group-001-runtime.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert no-answer runtime scope
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, pathlib
          manifest=json.loads(pathlib.Path('training-data/DEV-GROUP-001/manifest.json').read_text())
          assert manifest['answer_payload_present'] is False
          assert manifest['runtime_answer_scan']=='PASS'
          assert manifest['case_count']==5
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dev-group-001-no-answer-runtime
          path: |
            training-data/DEV-GROUP-001/cases/
            training-data/DEV-GROUP-001/manifest.json
            training-data/DEV-GROUP-001/revisions/0001.json
            training-data/DEV-GROUP-001/revisions/0002.json
          if-no-files-found: error
          retention-days: 1
