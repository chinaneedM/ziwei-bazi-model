name: one-time-preauthorize-dev-group-002

on:
  push:
    paths:
      - '.github/workflows/one-time-preauthorize-dev-group-002.yml'

permissions:
  contents: write

jobs:
  preauthorize-and-materialize:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      GROUP_RUN_ID: GROUP-RUN-20260719T180659JST-0052B111B31D
      SESSION_ID: CHAT-R17-CLEAN-20260719T180659JST-0052B111B31D
    steps:
      - name: Checkout exact runtime branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime and test runner
        run: python -m pip install -e . pytest

      - name: Verify active installed state and answer-free group pointer
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          state = json.loads(Path('reports/install-state.json').read_text(encoding='utf-8'))
          if state.get('status') != 'INSTALLED_VALIDATED':
              raise SystemExit('runtime is not installed validated')
          if state.get('automation_runtime_install_status') != 'INSTALLED_VALIDATED_READY_FOR_USER_INITIATED_CLEAN_START':
              raise SystemExit('runtime is not ready for clean start')
          if state.get('next_allowed_action') != 'USER_INITIATED_CLEAN_START':
              raise SystemExit('clean start is not the allowed next action')
          if state.get('background_execution') is not False:
              raise SystemExit('background execution boundary invalid')

          pointer = json.loads(Path('CURRENT_GROUP_MANIFEST').read_text(encoding='utf-8'))
          if pointer.get('schema') != 'CURRENT-GROUP-MANIFEST-POINTER-V1' or pointer.get('status') != 'ACTIVE':
              raise SystemExit('current group pointer invalid')
          if pointer.get('group_id') != 'DEV-GROUP-002':
              raise SystemExit('unexpected group id')
          if pointer.get('answer_payload_present') is not False or pointer.get('runtime_answer_scan') != 'PASS':
              raise SystemExit('pointer answer isolation failed')
          if pointer.get('case_order') != [f'DEV-EXAMPLE-{i:03d}' for i in range(1, 6)]:
              raise SystemExit('case order mismatch')
          if pointer.get('question_count_total') != 25 or pointer.get('question_counts') != [5, 5, 5, 5, 5]:
              raise SystemExit('question count mismatch')
          PY

      - name: Build V2 preauthorized request before prediction context
        shell: bash
        run: |
          set -euo pipefail
          request="runtime/clean-start-requests/${GROUP_RUN_ID}.json"
          test ! -e "$request"
          test ! -e "data/group-clean-starts/${GROUP_RUN_ID}"
          PYTHONPATH=src python scripts/create-staged-group-clean-start.py prepare-request \
            --current-group-manifest CURRENT_GROUP_MANIFEST \
            --output "$request" \
            --group-run-id "$GROUP_RUN_ID" \
            --session-id "$SESSION_ID" \
            --mode CHAT_ONLY \
            > /tmp/preauthorized-request-result.json

      - name: Materialize exact staged clean start
        shell: bash
        run: |
          set -euo pipefail
          request="runtime/clean-start-requests/${GROUP_RUN_ID}.json"
          PYTHONPATH=src python scripts/create-staged-group-clean-start.py create-from-request \
            --request "$request" \
            --current-group-manifest CURRENT_GROUP_MANIFEST \
            > /tmp/clean-start-result.json
          clean="data/group-clean-starts/${GROUP_RUN_ID}/clean-start.json"
          test -f "$clean"
          PYTHONPATH=src python scripts/group-training-pipeline.py validate-clean-start \
            --clean-start "$clean" \
            --output /tmp/clean-start-validation.json

      - name: Verify fresh IDs, five cases, answer isolation, and exact future entrypoint
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          group_run_id = os.environ['GROUP_RUN_ID']
          session_id = os.environ['SESSION_ID']
          request_path = Path(f'runtime/clean-start-requests/{group_run_id}.json')
          clean_path = Path(f'data/group-clean-starts/{group_run_id}/clean-start.json')
          request = json.loads(request_path.read_text(encoding='utf-8'))
          clean = json.loads(clean_path.read_text(encoding='utf-8'))
          validation = json.loads(Path('/tmp/clean-start-validation.json').read_text(encoding='utf-8'))

          if request.get('schema') != 'GROUP-CLEAN-START-REQUEST-V2':
              raise SystemExit('request schema invalid')
          required_false = [
              'prediction_context_started',
              'prediction_context_repository_search_used',
              'prediction_context_commit_history_used',
              'prediction_context_old_run_objects_visible',
          ]
          if any(request.get(key) is not False for key in required_false):
              raise SystemExit('prediction context preauthorization flags invalid')
          if request.get('request_origin') != 'PREAUTHORIZED_ENGINEERING_BOOTSTRAP':
              raise SystemExit('request origin invalid')
          if request.get('group_run_id') != group_run_id or request.get('session_id') != session_id:
              raise SystemExit('request identity mismatch')
          expected_entry = f'data/group-clean-starts/{group_run_id}/clean-start.json'
          if request.get('future_prediction_entrypoint') != expected_entry:
              raise SystemExit('future entrypoint mismatch')
          if request.get('future_prediction_first_repository_action') != 'FETCH_EXACT_CLEAN_START_PATH_ONLY':
              raise SystemExit('future first action invalid')

          if clean.get('schema') not in {'GROUP-CLEAN-START-V1', 'STAGED-GROUP-CLEAN-START-V1'}:
              raise SystemExit(f"clean-start schema invalid: {clean.get('schema')}")
          if clean.get('status') != 'READY_FOR_PREBLIND_MODELING':
              raise SystemExit(f"clean-start status invalid: {clean.get('status')}")
          if clean.get('group_run_id') != group_run_id:
              raise SystemExit('clean-start group run id mismatch')
          if clean.get('answer_data_available') is not False:
              raise SystemExit('answer data became available')
          if len(clean.get('cases', [])) != 5:
              raise SystemExit('clean-start case count mismatch')
          if [row.get('case_id') for row in clean.get('cases', [])] != [f'DEV-EXAMPLE-{i:03d}' for i in range(1, 6)]:
              raise SystemExit('clean-start case order mismatch')
          if validation.get('status') != 'PASS':
              raise SystemExit(f'clean-start validation failed: {validation}')

          report = {
              'schema': 'DEV-GROUP-002-PREAUTHORIZED-CLEAN-START-RECEIPT-V1',
              'status': 'PASS',
              'group_id': 'DEV-GROUP-002',
              'group_run_id': group_run_id,
              'session_id': session_id,
              'request_path': request_path.as_posix(),
              'request_sha256': hashlib.sha256(request_path.read_bytes()).hexdigest(),
              'clean_start_path': clean_path.as_posix(),
              'clean_start_sha256': hashlib.sha256(clean_path.read_bytes()).hexdigest(),
              'case_count': 5,
              'question_count_total': 25,
              'answer_data_available': False,
              'prediction_context_started': False,
              'future_prediction_first_repository_action': 'FETCH_EXACT_CLEAN_START_PATH_ONLY',
              'formal_prediction_status': 'NOT_STARTED_REQUIRES_FRESH_PREDICTION_CONTEXT',
              'score_eligibility': 'NONE_BEFORE_PREDICTION_FREEZE_AND_CAUSAL_USE_RECEIPT',
          }
          encoded = json.dumps(report, ensure_ascii=False, sort_keys=True, separators=(',', ':')).encode('utf-8')
          report['object_hash'] = hashlib.sha256(encoded).hexdigest()
          report_path = Path(f'reports/clean-start-preauthorization/{group_run_id}.json')
          report_path.parent.mkdir(parents=True, exist_ok=True)
          report_path.write_text(json.dumps(report, ensure_ascii=False, sort_keys=True, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Remove one-time workflow and commit immutable startup objects
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/one-time-preauthorize-dev-group-002.yml
          git add \
            "runtime/clean-start-requests/${GROUP_RUN_ID}.json" \
            "data/group-clean-starts/${GROUP_RUN_ID}" \
            "reports/clean-start-preauthorization/${GROUP_RUN_ID}.json"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Preauthorize clean start ${GROUP_RUN_ID}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
