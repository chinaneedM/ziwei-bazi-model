name: workflow-scan-diagnostic
on:
  pull_request:
permissions:
  contents: read
jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e .
      - name: Capture scanner result
        run: python -c "import json; from fortune_v1.topology import scan_runtime_workflows; open('workflow-scan.json','w',encoding='utf-8').write(json.dumps(scan_runtime_workflows('.'),ensure_ascii=False,indent=2))"
      - uses: actions/upload-artifact@v4
        with:
          name: workflow-scan-output
          path: workflow-scan.json
