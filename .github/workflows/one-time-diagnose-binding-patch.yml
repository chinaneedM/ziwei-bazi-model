name: one-time-diagnose-binding-patch

on:
  push:
    paths:
      - '.github/workflows/one-time-diagnose-binding-patch.yml'

permissions:
  actions: read
  contents: write

jobs:
  diagnose-and-remove-self:
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_BRANCH: agent/runtime-binding-compat
      TARGET_COMMIT: 3ff4d344b09a6405b3a0a1143bab496db90022f0
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true
      - name: Read workflow status
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/runtime-diagnostics
          gh api "repos/$GITHUB_REPOSITORY/actions/workflows/one-time-runtime-binding-compat.yml/runs?branch=$TARGET_BRANCH&event=push&per_page=30" > /tmp/runs.json
          python - <<'PY'
          import json, os, subprocess
          from pathlib import Path
          rows = json.loads(Path('/tmp/runs.json').read_text()).get('workflow_runs', [])
          rows = [row for row in rows if row.get('head_sha') == os.environ['TARGET_COMMIT']]
          result = {'schema':'BINDING-PATCH-DIAGNOSTIC-V1','run_count':len(rows),'runs':[]}
          for row in rows:
              jobs = json.loads(subprocess.check_output(['gh','api',f"repos/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{row['id']}/jobs?per_page=100"], text=True)).get('jobs', [])
              result['runs'].append({'id':row['id'],'status':row['status'],'conclusion':row['conclusion'],'jobs':[{'id':job['id'],'name':job['name'],'status':job['status'],'conclusion':job['conclusion'],'steps':[{'name':step['name'],'status':step['status'],'conclusion':step['conclusion']} for step in job.get('steps',[])]} for job in jobs]})
          result['status']='FOUND' if rows else 'NOT_FOUND'
          Path('reports/runtime-diagnostics/binding-patch-run.json').write_text(json.dumps(result,sort_keys=True,indent=2)+'\n')
          PY
      - name: Remove workflow and commit report
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/one-time-diagnose-binding-patch.yml
          git add reports/runtime-diagnostics/binding-patch-run.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'Record binding patch diagnostic'
          git push origin "HEAD:${GITHUB_REF_NAME}"
