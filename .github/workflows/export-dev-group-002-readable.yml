name: Export DEV-GROUP-002 readable transport

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/export-dev-group-readable-sidecars.py
      - training-data/DEV-GROUP-002/cases/**
      - training-data/DEV-GROUP-002/manifest.json

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Export independent UTF-8 sidecars
        run: python scripts/export-dev-group-readable-sidecars.py > reports/dev-group-002-readable-export.json
      - name: Validate generated transport
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          root = Path('.')
          manifest_path = root / 'training-data/DEV-GROUP-002/readable/manifest.json'
          obj = json.loads(manifest_path.read_text(encoding='utf-8'))
          assert obj['status'] == 'PASS_READY_FOR_COMPLETE_CHAT_READBACK'
          assert obj['answer_payload_present'] is False
          assert obj['answer_reference_disclosed'] is False
          assert obj['case_count'] == 5
          assert obj['question_count_total'] == 25
          for case in obj['cases']:
              assert case['answer_scan'] == 'PASS'
              assert case['status'] == 'PASS_READABLE_TRANSPORT'
              for receipt in [*case['files'].values(), case['input_index']]:
                  data = (root / receipt['path']).read_bytes()
                  assert len(data) == receipt['bytes']
                  assert hashlib.sha256(data).hexdigest() == receipt['sha256']
          print('PASS')
          PY
      - name: Commit generated transport
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add training-data/DEV-GROUP-002/readable reports/dev-group-002-readable-export.json
          if git diff --cached --quiet; then
            echo 'No generated changes'
          else
            git commit -m 'Materialize readable DEV-GROUP-002 transport [skip ci]'
            git push
          fi
