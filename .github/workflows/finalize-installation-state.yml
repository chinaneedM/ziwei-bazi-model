name: finalize-installation-state

on:
  workflow_run:
    workflows: ["final-install-check"]
    types: [completed]

permissions:
  contents: read

jobs:
  replay-final-install-check-v3:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    concurrency:
      group: installation-state-v3-${{ github.event.workflow_run.head_sha }}
      cancel-in-progress: false
    steps:
      - name: Checkout validated main commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime and test runner
        run: python -m pip install -e . pytest

      - name: Replay complete V3 install check on exact main commit
        shell: bash
        env:
          CODE_COMMIT: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/final-installation-state-v3
          make install-check \
            PYTHON=python \
            REPOSITORY_VISIBILITY=public \
            EXPECTED_COMMIT="$CODE_COMMIT" \
            ACTIVATION_MODE=main \
            INSTALL_RECEIPT=/tmp/final-installation-state-v3/install-receipt.json

      - name: Enforce installed validated readback
        shell: bash
        env:
          CODE_COMMIT: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          receipt = json.loads(Path('/tmp/final-installation-state-v3/install-receipt.json').read_text(encoding='utf-8'))
          if receipt.get('schema') != 'FINAL-OPEN-SOURCE-INSTALL-CHECK-RECEIPT-V3':
              raise SystemExit('unexpected receipt schema')
          if receipt.get('status') != 'INSTALLED_VALIDATED_READY_FOR_USER_INITIATED_CLEAN_START':
              raise SystemExit(f'installed validation did not pass: {receipt}')
          if receipt.get('code_commit') != os.environ['CODE_COMMIT']:
              raise SystemExit('receipt commit mismatch')
          if receipt.get('failure_count') != 0 or receipt.get('pass_count') != receipt.get('check_count'):
              raise SystemExit('receipt contains failed checks')
          if receipt.get('formal_training_permission') != 'READY_FOR_USER_INITIATED_CLEAN_START_ONLY':
              raise SystemExit('training permission boundary invalid')
          if receipt.get('score_eligibility') != 'CONDITIONAL_PER_RUN_CAUSAL_USE_RECEIPT_PASS':
              raise SystemExit('score eligibility boundary invalid')
          if receipt.get('background_execution') is not False:
              raise SystemExit('background execution boundary invalid')
          PY

      - name: Upload immutable readback artifact without repository mutation
        uses: actions/upload-artifact@v4
        with:
          name: final-installation-state-v3-${{ github.event.workflow_run.head_sha }}
          path: /tmp/final-installation-state-v3/install-receipt.json
          if-no-files-found: error
          retention-days: 90
