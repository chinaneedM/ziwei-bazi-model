name: freeze-dev-group-002-relative-replays

on:
  push:
    paths:
      - .github/workflows/freeze-dev-group-002-relative-replays.yml
      - src/fortune_v1/relative_replay.py
      - data/chat-work-candidates/DEV-EXAMPLE-00*.prediction-body-draft.json
      - data/chat-work-candidates/DEV-EXAMPLE-00*.pairwise-replay-overlay.json
      - data/chat-work-candidates/RUN-DEV-GROUP-002-20260717-9004B204-01.contract-input-manifest.json
  pull_request:
    paths:
      - .github/workflows/freeze-dev-group-002-relative-replays.yml
      - src/fortune_v1/relative_replay.py
      - data/chat-work-candidates/DEV-EXAMPLE-00*.prediction-body-draft.json
      - data/chat-work-candidates/DEV-EXAMPLE-00*.pairwise-replay-overlay.json
      - data/chat-work-candidates/RUN-DEV-GROUP-002-20260717-9004B204-01.contract-input-manifest.json
  workflow_dispatch:

permissions:
  contents: read

jobs:
  freeze-relative-replays:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      - name: Assemble and freeze five relative replay objects
        run: |
          set -euo pipefail
          export PYTHONPATH=src
          mkdir -p data/relative-replay-candidates frozen/relative-replays reports/relative-replay
          python - <<'PY'
          import copy, json
          from pathlib import Path
          from fortune_v1.relative_replay import freeze_relative_replay

          cases = ('DEV-EXAMPLE-001','DEV-EXAMPLE-002','DEV-EXAMPLE-003','DEV-EXAMPLE-004','DEV-EXAMPLE-005')
          vectors = {
              'DEV-EXAMPLE-001': ('CBBAD','ADDCC'),
              'DEV-EXAMPLE-002': ('DDCBA','BBDDB'),
              'DEV-EXAMPLE-003': ('AACBC','CCAAB'),
              'DEV-EXAMPLE-004': ('CBDCD','DDAAA'),
              'DEV-EXAMPLE-005': ('BABAB','DDADC'),
          }
          input_manifest = json.loads(Path('data/chat-work-candidates/RUN-DEV-GROUP-002-20260717-9004B204-01.contract-input-manifest.json').read_text(encoding='utf-8'))
          case_inputs = {row['case_id']: row for row in input_manifest['cases']}
          overlays = {}
          for case_id in ('DEV-EXAMPLE-002','DEV-EXAMPLE-004'):
              p = Path('data/chat-work-candidates') / f'{case_id}.pairwise-replay-overlay.json'
              overlay = json.loads(p.read_text(encoding='utf-8'))
              assert overlay['answer_access_performed'] is False
              assert overlay['frozen_values_changed'] is False
              overlays[case_id] = overlay

          receipts = []
          for case_id in cases:
              draft = json.loads((Path('data/chat-work-candidates') / f'{case_id}.prediction-body-draft.json').read_text(encoding='utf-8'))
              questions = copy.deepcopy(draft['questions'])
              if case_id in overlays:
                  for operation in overlays[case_id]['operations']:
                      q = next(item for item in questions if item['question_id'] == operation['question_id'])
                      row = next(item for item in q['pairwise_rows'] if {item['left'], item['right']} == set(operation['pair']))
                      assert row['winner'] == operation['old_winner']
                      row['winner'] = operation['new_winner']
                      row['decision_basis'] = operation['decision_basis']
                      row['distinctive_atom_comparison'] = operation['distinctive_atom_comparison']

              for q in questions:
                  q.pop('ziwei_track', None)
                  q.pop('bazi_track', None)
                  q['track_replay_status'] = {
                      'ziwei': 'UNSEALED_REPLAY_ONLY',
                      'bazi': 'VERSION_CONFLICT_UNSEALED' if case_id == 'DEV-EXAMPLE-004' else 'UNSEALED_REPLAY_ONLY',
                  }
                  for entry in q.get('evidence_ledger', []):
                      if 'capability_ceILING' in entry:
                          entry['capability_ceiling'] = entry.pop('capability_ceILING')

              top1 = ''.join(q['top1'] for q in questions)
              top2 = ''.join(q['top2'] for q in questions)
              assert (top1, top2) == vectors[case_id]
              source = case_inputs[case_id]
              obj = {
                  'schema': 'RELATIVE-PREDICTION-REPLAY-V1',
                  'run_id': f'RELATIVE-REPLAY-DEV-GROUP-002-{case_id}',
                  'case_id': case_id,
                  'dataset_type': 'DEV',
                  'cold_start': True,
                  'answer_access_performed': False,
                  'retrospective_replay': True,
                  'formal_validity': 'INVALID_UNSEALED',
                  'formal_prediction_frozen': False,
                  's03_formal_fusion_performed': False,
                  'input_reference': {
                      'kind': 'ANSWER_ISOLATED_SOURCE_CASE',
                      'path': source['source_case_path'],
                      'sha256': source['source_case_sha256'],
                  },
                  'top1_vector': top1,
                  'top2_vector': top2,
                  'questions': questions,
              }
              candidate_path = Path('data/relative-replay-candidates') / f'{case_id}.json'
              candidate_path.write_text(json.dumps(obj, ensure_ascii=False, sort_keys=True, indent=2) + '\n', encoding='utf-8')
              receipt = freeze_relative_replay(candidate_path, 'frozen/relative-replays')
              receipts.append({
                  'case_id': case_id,
                  'run_id': receipt['run_id'],
                  'freeze_status': receipt['freeze_status'],
                  'formal_prediction_frozen': receipt['formal_prediction_frozen'],
                  's03_formal_fusion_performed': receipt['s03_formal_fusion_performed'],
                  'answer_access_performed': receipt['answer_access_performed'],
              })

          Path('reports/relative-replay/summary.json').write_text(json.dumps({
              'schema': 'DEV-GROUP-002-RELATIVE-REPLAY-FREEZE-SUMMARY-V1',
              'status': 'FIVE_RELATIVE_REPLAYS_FROZEN',
              'case_count': 5,
              'receipts': receipts,
              'formal_prediction_run_count': 0,
              's03_formal_fusion_count': 0,
              'answer_access_performed': False,
          }, ensure_ascii=False, sort_keys=True, indent=2) + '\n', encoding='utf-8')
          PY
      - name: Upload relative replay freeze objects
        uses: actions/upload-artifact@v4
        with:
          name: dev-group-002-relative-replay-freeze
          path: |
            data/relative-replay-candidates
            frozen/relative-replays
            reports/relative-replay
          if-no-files-found: error
          retention-days: 7
