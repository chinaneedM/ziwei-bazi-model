name: one-time-map-five-training-cases

on:
  push:
    paths:
      - '.github/workflows/one-time-map-five-training-cases.yml'

permissions:
  contents: write

jobs:
  map-and-remove-self:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Map exact five case assets
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          ids = [f'DEV-EXAMPLE-{i:03d}' for i in range(1, 6)]
          extensions = {'.json', '.txt', '.md', '.png', '.jpg', '.jpeg', '.webp', '.pdf', '.rar', '.zip', '.7z'}
          exclude_roots = {'.git'}
          rows = {case_id: [] for case_id in ids}

          for path in sorted(p for p in Path('.').rglob('*') if p.is_file()):
              if any(part in exclude_roots for part in path.parts):
                  continue
              rel = path.as_posix()
              matched = [case_id for case_id in ids if case_id in rel]
              if not matched:
                  try:
                      if path.suffix.lower() in extensions and path.stat().st_size <= 5_000_000:
                          text = path.read_text(encoding='utf-8', errors='ignore')
                          matched = [case_id for case_id in ids if case_id in text]
                      else:
                          text = ''
                  except Exception:
                      text = ''
              else:
                  text = path.read_text(encoding='utf-8', errors='ignore') if path.suffix.lower() in {'.json','.txt','.md'} and path.stat().st_size <= 5_000_000 else ''
              if not matched:
                  continue
              lower = rel.lower()
              for case_id in matched:
                  category = 'OTHER'
                  if any(token in lower for token in ('answer', 'reveal', 'literal-replay', 'score')):
                      category = 'ANSWER_OR_POSTREVEAL'
                  elif any(token in lower for token in ('preblind', 'input', 'intake', 'source-case', 'case-data')):
                      category = 'INPUT_OR_PREBLIND'
                  elif any(token in lower for token in ('option', 'question', 'postblind')):
                      category = 'QUESTION_OR_OPTIONS'
                  elif any(token in lower for token in ('prediction', 'freeze', 'seal')):
                      category = 'PREDICTION_OR_FREEZE'
                  elif any(token in lower for token in ('report', 'learning', 'regression', 'training')):
                      category = 'HISTORICAL_REPORT_OR_TRAINING'
                  rows[case_id].append({
                      'path': rel,
                      'category': category,
                      'suffix': path.suffix.lower(),
                      'byte_length': path.stat().st_size,
                      'sha256': hashlib.sha256(path.read_bytes()).hexdigest(),
                      'contains_case_id_in_content': case_id in text,
                  })

          summary = {}
          for case_id, assets in rows.items():
              categories = sorted({row['category'] for row in assets})
              summary[case_id] = {
                  'asset_count': len(assets),
                  'categories': categories,
                  'has_input_or_preblind': 'INPUT_OR_PREBLIND' in categories,
                  'has_question_or_options': 'QUESTION_OR_OPTIONS' in categories,
                  'has_answer_or_postreveal': 'ANSWER_OR_POSTREVEAL' in categories,
                  'has_historical_reports': 'HISTORICAL_REPORT_OR_TRAINING' in categories,
                  'assets': assets,
              }

          result = {
              'schema': 'FIVE-TRAINING-CASE-ASSET-MAP-V1',
              'status': 'PASS',
              'case_ids': ids,
              'case_count': len(ids),
              'summary': summary,
          }
          out = Path('reports/training-example-inventory/five-case-asset-map.json')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(result, ensure_ascii=False, sort_keys=True, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Remove one-time workflow and commit map
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/one-time-map-five-training-cases.yml
          git add reports/training-example-inventory/five-case-asset-map.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'Map five registered training case assets'
          git push origin "HEAD:${GITHUB_REF_NAME}"
