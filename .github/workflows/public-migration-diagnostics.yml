name: public-migration-diagnostics

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run compact diagnostics
        shell: bash
        run: |
          mkdir -p diagnostics
          set +e

          python -m pip install -e . > diagnostics/pip-install.log 2>&1
          echo "$?" > diagnostics/pip-install.status

          if [ "$(cat diagnostics/pip-install.status)" = "0" ]; then
            python -m unittest discover -s tests -v > diagnostics/unittest.log 2>&1
            echo "$?" > diagnostics/unittest.status
          else
            echo "SKIPPED_INSTALL_FAILED" > diagnostics/unittest.log
            echo "125" > diagnostics/unittest.status
          fi

          python scripts/verify-public-only-repository.py \
            --root . \
            --visibility "${{ github.event.repository.visibility }}" \
            > diagnostics/public-policy.log 2>&1
          echo "$?" > diagnostics/public-policy.status

          python scripts/verify-open-source-release.py \
            --root . \
            --visibility "${{ github.event.repository.visibility }}" \
            > diagnostics/open-source-release.log 2>&1
          echo "$?" > diagnostics/open-source-release.status

          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('diagnostics')
          names = ['pip-install', 'unittest', 'public-policy', 'open-source-release']
          payload = {
              'schema': 'PUBLIC-MIGRATION-DIAGNOSTICS-V1',
              'statuses': {
                  name: int((root / f'{name}.status').read_text().strip())
                  for name in names
              },
          }
          (root / 'summary.json').write_text(
              json.dumps(payload, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY

          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: public-migration-diagnostics
          path: diagnostics/
          if-no-files-found: error
          retention-days: 7

      - name: Enforce engineering gates
        shell: bash
        run: |
          test "$(cat diagnostics/pip-install.status)" = "0"
          test "$(cat diagnostics/unittest.status)" = "0"
          test "$(cat diagnostics/public-policy.status)" = "0"
