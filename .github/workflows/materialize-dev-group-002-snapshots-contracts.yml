name: materialize-dev-group-002-snapshots-contracts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-materialized-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate committed answer-free snapshot manifests and contracts
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          cases = ('DEV-EXAMPLE-001','DEV-EXAMPLE-002','DEV-EXAMPLE-003','DEV-EXAMPLE-005')
          for case_id in cases:
              contract_path = Path('data/prediction-contracts') / f'{case_id}.json'
              contract = json.loads(contract_path.read_text(encoding='utf-8'))
              assert contract['schema'] == 'PREDICTION-RUN-CONTRACT-V1'
              assert contract['case_id'] == case_id
              assert contract['answer_data_available'] is False
              assert len(contract['questions']) == 5
              assert all(q['required_pairwise_rows'] == 6 for q in contract['questions'])
              snapshot_path = Path(contract['snapshot']['path'])
              snapshot = json.loads(snapshot_path.read_text(encoding='utf-8'))
              assert snapshot['schema'] == 'PREDICTION-INPUT-SNAPSHOT-V1'
              assert snapshot['case_id'] == case_id
              assert snapshot['answer_scan']['status'] == 'PASS'
              assert snapshot['answer_scan']['findings'] == []

          blocked = json.loads(Path('reports/DEV-EXAMPLE-004-snapshot-contract-blocked.json').read_text(encoding='utf-8'))
          assert blocked['status'] == 'BLOCKED_BY_BAZI_VERSION_CONFLICT'
          assert blocked['snapshot_generated'] is False
          assert blocked['contract_generated'] is False
          assert blocked['s03_formal_fusion_performed'] is False
          PY
