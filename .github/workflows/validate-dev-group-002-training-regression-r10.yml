name: validate-dev-group-002-training-regression-r10

on:
  push:
    paths:
      - reports/dev-group-002/training-regression-r10/**
      - reports/dev-group-002/training-regression-r9/**
      - training-data/DEV-GROUP-002/runtime-views/DEV-EXAMPLE-002/questions-parsed.json
      - .github/workflows/validate-dev-group-002-training-regression-r10.yml
  pull_request:
    paths:
      - reports/dev-group-002/training-regression-r10/**
      - reports/dev-group-002/training-regression-r9/**
      - training-data/DEV-GROUP-002/runtime-views/DEV-EXAMPLE-002/questions-parsed.json
      - .github/workflows/validate-dev-group-002-training-regression-r10.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize-and-validate-r10:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Materialize R10 regression diagnosis
        run: |
          python reports/dev-group-002/training-regression-r10/materialize_validate.py \
            --repo-root . --write --validate
      - name: Commit deterministic R10 artifacts
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add reports/dev-group-002/training-regression-r10/
          if git diff --cached --quiet; then
            echo 'R10 artifacts already frozen'
          else
            git commit -m 'Freeze DEV-GROUP-002 R10 regression diagnosis'
            git push origin HEAD:${{ github.ref_name }}
          fi
      - name: Upload R10 validation receipt
        uses: actions/upload-artifact@v4
        with:
          name: dev-group-002-training-regression-r10-validation
          path: reports/dev-group-002/training-regression-r10/validation.json
          if-no-files-found: error
          retention-days: 14
