name: work-score-frozen-once

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  score-frozen:
    if: >-
      github.event.issue.user.login == github.repository_owner &&
      startsWith(github.event.issue.title, '[WORK SCORE FROZEN] ROUND-001')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORTUNE_ANSWER_KEY: ${{ secrets.FORTUNE_ANSWER_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install and verify frozen input
        run: |
          test -n "$FORTUNE_ANSWER_KEY"
          python -m pip install -e .
          python -m fortune_training.cli verify --require-answers
          python - <<'PY'
          import json
          from pathlib import Path
          state = json.loads(Path("training/state.json").read_text(encoding="utf-8"))
          if state.get("status") != "PREDICTION_FROZEN" or state.get("active_round_id") != "ROUND-001":
              raise SystemExit("ROUND-001 is not the active frozen round")
          PY

      - name: Score with official encrypted answer
        run: |
          python -m fortune_training.cli score ROUND-001 --review-output /tmp/ROUND-001.review.json > /tmp/ROUND-001.score.json

      - name: Encrypt detailed review for the active Work session
        env:
          REVEAL_PUBLIC_KEY_DER_B64: ""
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path
          from cryptography.fernet import Fernet
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import padding

          public_key = serialization.load_der_public_key(
              base64.b64decode(os.environ["REVEAL_PUBLIC_KEY_DER_B64"])
          )
          transfer_key = Fernet.generate_key()
          encrypted_review = Fernet(transfer_key).encrypt(
              Path("/tmp/ROUND-001.review.json").read_bytes()
          )
          encrypted_key = public_key.encrypt(
              transfer_key,
              padding.OAEP(
                  mgf=padding.MGF1(algorithm=hashes.SHA256()),
                  algorithm=hashes.SHA256(),
                  label=None,
              ),
          )
          Path("/tmp/review.enc.b64").write_text(
              base64.b64encode(encrypted_review).decode("ascii"), encoding="ascii"
          )
          Path("/tmp/key.enc.b64").write_text(
              base64.b64encode(encrypted_key).decode("ascii"), encoding="ascii"
          )
          PY

      - name: Return sanitized score and encrypted review
        run: |
          {
            echo '官方加密答案已在冻结态完成评分。逐题对照仅以下列密文回传。'
            echo
            echo 'SCORE'
            echo '~~~json'
            cat /tmp/ROUND-001.score.json
            echo '~~~'
            echo
            echo 'ENCRYPTED_KEY_B64'
            cat /tmp/key.enc.b64
            echo
            echo 'ENCRYPTED_REVIEW_B64'
            cat /tmp/review.enc.b64
          } > /tmp/result.md
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file /tmp/result.md
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed

      - name: Report failure without secrets
        if: failure()
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "冻结轮次评分失败；未提交任何训练状态，答案与密钥未输出。运行：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
